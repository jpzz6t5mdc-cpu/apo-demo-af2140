<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- PWAホーム追加に馴染む（夕暮れの墨色） -->
<meta name="theme-color" content="#1a1815" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>きょうの自分 ― ハヤテ</title>

<!-- 手書き風フォント（Google Fonts CDN 1本のみ・読めなくても fallback で成立） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Kurenaido&display=swap" rel="stylesheet">

<!-- 本物の地図（Leaflet＝無料・キー不要のCDN1本。タイルはEsri/国土地理院の無料航空写真） -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

<style>
  /* ============================================================
     ★デザインの型＝ここを揃える（20画面で統一する見本）
     色も寸法もすべて CSS変数で定義。他画面はこの :root をコピーすれば
     同じ温度・同じ余白・同じ角丸で作れる＝「正直な鏡」の一貫性。
     ============================================================ */
  :root{
    /* ── 色：夕暮れの和紙＝墨と土の色（「一筆」の世界観を継承）── */
    --paper:#1a1815;        /* 背景：夜に向かう墨 */
    --paper2:#211e1a;
    --card:#252119;         /* 和紙カード */
    --card-edge:#3a342a;    /* カードの縁・仕切り線 */
    --ink:#f0e9da;          /* 墨の白文字（主役の文字） */
    --ink-soft:#b8ad97;     /* 薄墨（副文字） */
    --ink-faint:#857a64;    /* かすれ（注記・ラベル） */
    --vermilion:#d98a5b;    /* 朱・夕陽（行動＝主役の差し色） */
    --vermilion-soft:#e3a378;
    --gold:#cbb27a;         /* ほのかな金（称号・見出し） */
    --leaf:#8fae7d;         /* 草の緑（達成・控えめ） */

    /* ── 寸法：角丸・余白・文字（部品の基準）── */
    --r-lg:18px;            /* 大カードの角丸 */
    --r-md:13px;           /* 中カードの角丸 */
    --r-sm:9px;            /* バッジ・小物の角丸 */
    --gap:10px;            /* ゾーン間の余白 */
    --pad:14px;           /* カード内の余白 */
    --fs-title:15px;      /* 見出し */
    --fs-body:13.5px;     /* 本文 */
    --fs-small:11.5px;    /* 注記・ラベル */
    --fs-num:32px;        /* 主役の数字 */
    --bar-h:9px;          /* 進捗バーの高さ */
  }

  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-text-size-adjust:100%;}
  html,body{height:100%; overflow:hidden;}
  body{
    background:
      radial-gradient(120% 70% at 50% -10%, #2a241c 0%, var(--paper) 55%, var(--paper2) 100%);
    color:var(--ink);
    font-family:"Zen Kurenaido","Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.55;
  }

  /* ============================================================
     画面全体＝スマホ縦1枚。手描きの3ゾーンを CSS Grid で再現。
       ┌──────┬──────────────┐
       │      │  右上：目標 (1/3)   │   左列：幅18〜20%・全高（ランキング）
       │ ラン │──────────────│   右列：上1/3=目標／下2/3=地図
       │ キン │                  │
       │ グ   │  右下：地図 (2/3)   │
       └──────┴──────────────┘
     下に細いバー＝入力プレースホルダ（手描きに無い＝置き場所は要相談）
     safe-area対応（上ノッチ／下ホームバーを避ける）
     ============================================================ */
  .app{
    height:100dvh; height:100svh;        /* 動的ビューポート優先 */
    max-width:480px; margin:0 auto;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) 8px 0 8px;
  }
  @supports not (height:100dvh){
    .app{ height:100vh; }                /* 古い端末フォールバック */
  }

  /* 上：3ゾーンの本体（残り全高を占める） */
  .stage{
    flex:1 1 auto;
    display:grid;
    /* ★左帯＝約19%（手描きの18〜20%）／右＝残り */
    grid-template-columns:19% 1fr;
    grid-template-rows:1fr;
    gap:var(--gap);
    min-height:0;            /* 子のはみ出し防止 */
    padding-bottom:var(--gap);
  }

  /* 右列を上1/3・下2/3に分ける入れ物 */
  .right{
    display:grid;
    /* ★右上 目標＝1／右下 地図＝2（＝下が最大） */
    grid-template-rows:1fr 2fr;
    gap:var(--gap);
    min-height:0;
  }

  /* ── 共通カード（部品）──────────────────── */
  .card{
    background:
      linear-gradient(180deg, rgba(255,250,238,.04), rgba(0,0,0,.06)),
      var(--card);
    border:1px solid var(--card-edge);
    border-radius:var(--r-lg);
    box-shadow:0 14px 34px -22px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,245,225,.04);
    overflow:hidden;
  }

  /* ── 左：縦帯（今月のアポ件数の順位）──────────────── */
  .rank{
    display:flex; flex-direction:column;
    padding:10px 6px 10px 6px;
    position:relative;
  }
  /* 小さな見出し（"ランキング"の語は出さない＝アイコン＋「今月のアポ」） */
  .rank .cap{
    text-align:center;
    font-family:"Yuji Syuku",serif;
    font-size:11px; letter-spacing:.06em;
    color:var(--gold);
    margin-bottom:8px;
    opacity:.92;
    line-height:1.35;
  }
  .rank .cap .ic{ font-size:13px; display:block; margin-bottom:1px; }
  /* 区切りの細線 */
  .rank .hr{
    height:1px; margin:2px 2px 8px;
    background:linear-gradient(90deg,transparent,var(--card-edge),transparent);
  }
  /* 順位の行（小さく数人ぶん＝今月のアポ件数） */
  .rank ol{ list-style:none; display:flex; flex-direction:column; gap:5px; }
  .rank li{
    display:flex; align-items:center; gap:4px;
    font-size:11px; color:var(--ink-soft);
    background:rgba(255,250,238,.02);
    border:1px solid rgba(58,52,42,.6);
    border-radius:var(--r-sm);
    padding:4px 5px;
  }
  .rank li .pos{
    font-feature-settings:"tnum";
    color:var(--ink-faint); min-width:13px; text-align:center; font-size:10.5px;
  }
  .rank li .who{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rank li .cnt{ color:var(--ink-faint); font-size:10px; font-feature-settings:"tnum"; }
  /* 自分の行＝そっと朱で印（責めない・主役は本人） */
  .rank li.me{
    background:linear-gradient(180deg, rgba(217,138,91,.14), rgba(217,138,91,.04));
    border-color:rgba(217,138,91,.45);
    color:var(--vermilion-soft);
  }
  .rank li.me .pos,.rank li.me .cnt{ color:var(--vermilion-soft); }

  /* ── 右上：目標（〜13時／〜17時／〜19時の3段・話した数）──────── */
  .goal{
    padding:var(--pad);
    display:flex; flex-direction:column; justify-content:center;
  }
  .goal .h{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:8px;
  }
  .goal .h .t{
    font-family:"Yuji Syuku",serif; font-size:var(--fs-title);
    color:var(--gold); letter-spacing:.06em;
  }
  .goal .h .sub{ font-size:var(--fs-small); color:var(--ink-faint); }
  /* 3段の時間チェックポイント */
  .goal .steps{ display:flex; flex-direction:column; gap:6px; }
  .goal .step{
    display:flex; align-items:center; gap:8px;
    padding:5px 7px;
    border:1px solid rgba(58,52,42,.6);
    border-radius:var(--r-sm);
    background:rgba(255,250,238,.02);
  }
  .goal .step .when{
    flex:0 0 auto; width:46px;
    font-size:var(--fs-small); color:var(--ink-faint);
    letter-spacing:.02em;
  }
  .goal .step .mid{ flex:1; min-width:0; }
  .goal .step .num{
    font-feature-settings:"tnum"; font-size:11.5px; color:var(--ink-soft);
    margin-bottom:3px;
  }
  .goal .step .num b{ color:var(--ink-soft); font-weight:400; }
  /* 進捗バー（部品）＝朱で満ちる */
  .bar{
    height:var(--bar-h); border-radius:999px;
    background:rgba(255,250,238,.06);
    border:1px solid var(--card-edge);
    overflow:hidden;
  }
  .bar > i{
    display:block; height:100%; border-radius:999px;
    background:linear-gradient(90deg, var(--vermilion), var(--vermilion-soft));
    box-shadow:0 0 8px rgba(217,138,91,.4);
    transition:width .6s ease;
  }
  /* 今の時刻に当たる段＝そっと朱で強調（責めない） */
  .goal .step.live{
    background:linear-gradient(180deg, rgba(217,138,91,.13), rgba(217,138,91,.03));
    border-color:rgba(217,138,91,.45);
  }
  .goal .step.live .when{ color:var(--vermilion-soft); }
  .goal .step.live .num{ color:var(--ink); font-size:12.5px; }
  .goal .step.live .num b{ color:var(--vermilion-soft); font-weight:600; }
  /* 達成した段＝静かに金/緑で祝う */
  .goal .step.done .when{ color:var(--leaf); }
  .goal .step.done .num b{ color:var(--leaf); }
  .goal .step.done .bar > i{
    background:linear-gradient(90deg, var(--leaf), var(--gold));
    box-shadow:0 0 8px rgba(143,174,125,.4);
  }

  /* ── 右下：地図（本物の航空写真＝Leaflet。ホームは小さなプレビュー）──── */
  .map{
    position:relative;
    background:#211e1a;   /* タイル読込前の下地（墨） */
  }
  /* 実際の地図が入る器（Leafletのキャンバス） */
  .map .leafmap{ position:absolute; inset:0; z-index:1; }
  /* ホームのプレビューはタップで専門画面へ＝地図自体は触らせない（指で操作させない） */
  #home .map .leafmap{ pointer-events:none; }
  /* 帯ラベル「地図」＝左上に小さく（地図の上に浮かす） */
  .map .tag{
    position:absolute; left:8px; top:7px; z-index:3;
    font-family:"Yuji Syuku",serif; font-size:12px; color:var(--gold);
    background:rgba(26,24,21,.72); border:1px solid var(--card-edge);
    border-radius:var(--r-sm); padding:2px 8px; letter-spacing:.1em;
    pointer-events:none;
  }
  /* 凡例（隅に小さく）＝仮マークの色見本 */
  .map .legend{
    position:absolute; right:8px; bottom:8px; z-index:3;
    display:flex; flex-wrap:wrap; gap:4px 8px; font-size:10px; color:var(--ink-soft);
    background:rgba(26,24,21,.72); border:1px solid var(--card-edge);
    border-radius:var(--r-sm); padding:4px 7px; max-width:60%;
    pointer-events:none;
  }
  .map .legend .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:3px; vertical-align:middle; }

  /* Leafletのポップアップ／ツールチップを墨+朱+金の型に合わせる */
  .leaflet-container{ font-family:"Zen Kurenaido","Hiragino Sans",sans-serif; background:#211e1a; }
  .leaflet-popup-content-wrapper{
    background:var(--card); color:var(--ink); border:1px solid var(--card-edge);
    border-radius:var(--r-md); box-shadow:0 14px 34px -18px rgba(0,0,0,.85);
  }
  .leaflet-popup-tip{ background:var(--card); border:1px solid var(--card-edge); }
  .leaflet-popup-content{ font-size:12.5px; line-height:1.6; margin:10px 12px; }
  .leaflet-control-zoom a, .leaflet-bar a{
    background:var(--card); color:var(--ink-soft); border-color:var(--card-edge);
  }
  .leaflet-control-attribution{ background:rgba(26,24,21,.7)!important; color:var(--ink-faint)!important; font-size:9px; }
  .leaflet-control-attribution a{ color:var(--ink-soft)!important; }
  /* マーク（絵文字アイコン）＝航空写真の上でも沈まない白フチ */
  .pinmark span{ font-size:22px; line-height:26px; text-align:center; display:block;
    text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 3px #fff,0 0 4px rgba(0,0,0,.6); }
  /* ピン横の常時ラベル（コメントが有る時だけ・読めるよう墨地に白フチ） */
  .leaflet-tooltip.pin-label{
    background:rgba(26,24,21,.84); color:var(--ink); border:1px solid rgba(240,233,218,.5);
    border-radius:7px; padding:2px 7px; font-size:11px; font-weight:600;
    box-shadow:0 1px 4px rgba(0,0,0,.5); white-space:nowrap;
  }
  .leaflet-tooltip.pin-label::before{ display:none; }
  /* 現在地マーカー（脈打つ朱／青ではなく和の差し色） */
  .here-dot span{
    display:block; width:14px; height:14px; border-radius:50%;
    background:var(--leaf); border:2px solid #fff; box-shadow:0 0 0 0 rgba(143,174,125,.6);
    animation:pulse 1.8s ease-out infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(143,174,125,.55); }
    70%{ box-shadow:0 0 0 12px rgba(143,174,125,0); }
    100%{ box-shadow:0 0 0 0 rgba(143,174,125,0); }
  }

  /* ── 下：細いバー＝入力プレースホルダ（手描きに無い）──── */
  .inputbar{
    flex:0 0 auto;
    padding:0 2px calc(8px + env(safe-area-inset-bottom)) 2px;
  }
  .inputbar .btn{
    width:100%;
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:linear-gradient(180deg, rgba(217,138,91,.14), rgba(217,138,91,.05));
    border:1px dashed rgba(217,138,91,.5);   /* 破線＝まだ仮置き */
    border-radius:var(--r-md);
    color:var(--vermilion-soft);
    font-size:15px; font-family:"Zen Kurenaido",sans-serif;
    padding:13px 14px;
    cursor:pointer;
  }
  .inputbar .note{
    text-align:center; font-size:10.5px; color:var(--ink-faint);
    margin-top:5px; opacity:.8; letter-spacing:.02em;
  }

  /* ============================================================
     画面切替（SPA風）＝同一HTML内でホーム⇄専門画面を出し分け。
       ・ホームの3ゾーンはタップで専門画面へ（#rank/#goal/#map）
       ・専門画面は全画面＋◀戻る。型(色/角丸/余白/文字)は全画面共通
     ============================================================ */
  /* 各画面＝重ねて配置し、表示中だけ見せる（フェード/スライド） */
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) 8px calc(8px + env(safe-area-inset-bottom)) 8px;
    max-width:480px; margin:0 auto;
    opacity:0; visibility:hidden;
    transform:translateX(14px);
    transition:opacity .28s ease, transform .28s ease, visibility .28s;
    pointer-events:none;
  }
  .screen.show{
    opacity:1; visibility:visible; transform:translateX(0);
    pointer-events:auto;
  }
  /* ホームは元のflex流し（高さ計算は .app と同じ） */
  #home{ padding-bottom:0; }

  /* ホームの3ゾーン＝「押せる」軽い手応え（タップで少し沈む） */
  .tap{ cursor:pointer; transition:transform .12s ease, box-shadow .12s ease; }
  .tap:active{ transform:scale(.985); box-shadow:0 6px 18px -14px rgba(0,0,0,.8); }
  /* 押せる印＝隅にそっと指マーク（型を壊さない控えめさ） */
  .tap .hint{
    position:absolute; right:7px; top:6px; z-index:4;
    font-size:11px; color:var(--ink-faint); opacity:.6;
    pointer-events:none;
  }
  .rank.tap .hint{ position:absolute; }

  /* ── 専門画面 共通：◀戻る ＋ 見出し ── */
  .topbar{
    flex:0 0 auto;
    display:flex; align-items:center; gap:10px;
    padding:6px 2px 10px 2px;
  }
  .backbtn{
    display:inline-flex; align-items:center; gap:5px;
    background:linear-gradient(180deg, rgba(255,250,238,.05), rgba(0,0,0,.05));
    border:1px solid var(--card-edge);
    border-radius:var(--r-sm);
    color:var(--ink-soft); font-size:13px;
    font-family:"Zen Kurenaido",sans-serif;
    padding:7px 12px; cursor:pointer;
    transition:transform .12s ease;
  }
  .backbtn:active{ transform:scale(.95); }
  .topbar .ttl{
    font-family:"Yuji Syuku",serif; font-size:16px;
    color:var(--gold); letter-spacing:.08em;
  }
  /* 専門画面の本体＝1枚の大カードで全画面 */
  .pane{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; }
  .pane.card{ padding:var(--pad); overflow:auto; }

  /* 🏆 順位の専門画面＝フル順位表 */
  .ranktable{ list-style:none; display:flex; flex-direction:column; gap:7px; }
  .ranktable li{
    display:flex; align-items:center; gap:10px;
    font-size:14px; color:var(--ink-soft);
    background:rgba(255,250,238,.02);
    border:1px solid rgba(58,52,42,.6);
    border-radius:var(--r-md);
    padding:10px 12px;
  }
  .ranktable .pos{
    font-feature-settings:"tnum"; color:var(--ink-faint);
    min-width:26px; text-align:center; font-size:15px;
  }
  .ranktable .who{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ranktable .cnt{ color:var(--ink-faint); font-size:13px; font-feature-settings:"tnum"; }
  .ranktable .cnt b{ color:var(--ink-soft); font-weight:600; font-size:16px; margin-right:2px; }
  .ranktable li.me{
    background:linear-gradient(180deg, rgba(217,138,91,.16), rgba(217,138,91,.04));
    border-color:rgba(217,138,91,.5);
    color:var(--vermilion-soft);
  }
  .ranktable li.me .pos, .ranktable li.me .cnt, .ranktable li.me .cnt b{ color:var(--vermilion-soft); }

  /* 🎯 目標の専門画面＝3段すべて（大きめに） */
  .goalfull{ display:flex; flex-direction:column; gap:12px; }
  .goalfull .step{ padding:11px 13px; }
  .goalfull .step .when{ width:64px; font-size:13.5px; }
  .goalfull .step .num{ font-size:13.5px; margin-bottom:5px; }
  .goalfull .lead{ font-size:var(--fs-small); color:var(--ink-faint); margin-bottom:4px; }

  /* 🗺️ 地図の専門画面＝全画面の大きい地図 */
  .mapfull{ flex:1 1 auto; min-height:0; }

  /* ── 地図の専門画面の道具（ピンを付ける／状態の注記） ── */
  /* 全画面地図は flex で縦に積む：上=道具帯／真ん中=地図（伸びる）／下=注記 */
  #map .pane.card{ padding:0; overflow:hidden; }
  #map .maptools{
    flex:0 0 auto;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:10px 11px;
    border-bottom:1px solid var(--card-edge);
  }
  #map .leafmapfull{ flex:1 1 auto; min-height:0; position:relative; }
  #map .leafmapfull .leafmap{ position:absolute; inset:0; }
  /* 「📍 ここにピン」＝主役の朱ボタン */
  .map-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:linear-gradient(180deg, var(--vermilion), var(--vermilion-soft));
    border:1px solid rgba(217,138,91,.6); border-radius:var(--r-md);
    color:#231d15; font-weight:700; font-size:14px;
    font-family:"Zen Kurenaido",sans-serif;
    padding:9px 14px; cursor:pointer; transition:transform .12s ease;
  }
  .map-btn:active{ transform:scale(.96); }
  .map-tip{ font-size:11px; color:var(--ink-faint); flex:1; min-width:120px; line-height:1.35; }
  /* 下の注記＝「これは仮のマーク一覧」 */
  #map .map-note{
    flex:0 0 auto; padding:7px 11px calc(7px + env(safe-area-inset-bottom));
    font-size:10.5px; color:var(--ink-faint); border-top:1px solid var(--card-edge);
    background:rgba(0,0,0,.12);
  }

  /* ── マークを選ぶチップ／編集パネル（ポップアップ内の中身） ── */
  .markform{ font-size:12.5px; min-width:210px; }
  .markform .ttl{ font-weight:700; color:var(--gold); margin-bottom:3px; }
  .markform .meta{ font-size:11px; color:var(--ink-faint); margin-bottom:7px; }
  .markform .chips{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
  .markform .chip{
    font-size:12.5px; padding:5px 9px; border-radius:8px; cursor:pointer;

  /* ── ホームから1軒記録：現在地にピン→マークを選ぶチップ（#mapに入らず） ── */

  .homepick .chips{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:4px; }
  .homepick .chip{

  .homepick textarea{

    opacity:0; visibility:hidden; transition:opacity .26s ease, visibility .26s;

  .homepick-veil.show{ opacity:1; visibility:visible; }
</style>
</head>
<body>

<!-- ====== ホーム画面（3ゾーン＝それぞれタップで専門画面へ） ====== -->
<div class="app screen show" id="home">

  <!-- ====== 3ゾーン本体 ====== -->

    <!-- ◀ 左：縦帯（今月のアポ件数の順位／全高・幅約19%・"ランキング"の語は出さない）＝タップで順位の専門画面へ -->

<!-- ====== ホームから1軒記録：現在地ピン＋マークを選ぶシート（#mapと同じ保存先） ====== -->
<div class="homepick-veil" id="homePickVeil"></div>
<div class="homepick" id="homePick" aria-label="マークを選ぶ（ホームから記録）">

    <!-- 真ん中：本物の航空写真（既定Esri・切替で国土地理院／現在地＋精度円＋自分のピン） -->

      <div class="leafmap" id="fullMap"></div>
    </div>
    <!-- 下：仮の注記 -->
    <div class="map-note" id="mapNote">※マークの種類は<b>仮</b>です（あとでオーナーが直します）。位置は開き直しても残ります。</div>

<!-- 本物の地図（Leaflet本体・無料CDN1本） -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
/* =========================================================================
   この画面はモック（サンプル数値）。本物のGPS・実データは入れない＝¥0・単一HTML。
   役割：手描きレイアウト（左帯ランキング／右上 目標／右下 地図）を
        "実際のスマホ画面"として正確に再現できたかの証明＋型の見本。
   数字は本番では地図のピン（タップ記録）から自動集計される想定。
   ========================================================================= */

// サンプルデータ（「一筆」画面と同じあだ名・例の数字に揃える）
var data = {
  nick:  "ハヤテ",
  // きょう"話した数"（訪問でもアポでもなく、話せた数）
  talkedNow: 5,
  // きょうの目標＝時間チェックポイント3段（〜13時/〜17時/〜19時の話した数）
  // hourEnd＝その段が締まる時刻（時）。現在時刻の出し分けに使う。
  timeGoals: [
    { until:"〜13時", target:3,  hourEnd:13 },
    { until:"〜17時", target:7,  hourEnd:17 },
    { until:"〜19時", target:10, hourEnd:19 }
  ],
  // 順位＝今月のアポ件数（多い順）。フル順位表は人数多めに。煽らない。
  ranking: [
    { who:"ケン",   cnt:9 },
    { who:"ハヤテ", cnt:6, me:true },   // ← 自分
    { who:"ミオ",   cnt:4 },
    { who:"ソウ",   cnt:2 },
    { who:"リク",   cnt:8 },
    { who:"アヤ",   cnt:5 },
    { who:"ジン",   cnt:3 },
    { who:"ノア",   cnt:7 },
    { who:"ユウ",   cnt:1 },
    { who:"カイ",   cnt:5 }
  ]
};

// --- 今が何時か＝現在の時間帯（段）を決める ---
// 〜13時より前=0段／13:00〜17:00=1段／17:00〜19:00=2段／19:00以降=2段(終い)。
function currentBandIndex(goals){
  var h = new Date().getHours();
  for (var i = 0; i < goals.length; i++){
    if (h < goals[i].hourEnd) return i;   // この段がまだ進行中
  }
  return goals.length - 1;                // 19時以降＝最後の段（おつかれさま）
}

// --- 1段ぶんのHTML（目標と進捗＝話した数 5/7・あと2 ＋バー） ---
function stepHtml(goal, now, isLive){
  var target = goal.target;
  var done = now >= target;
  var pct  = target > 0 ? Math.min(100, Math.round(now / target * 100)) : 0;
  var left = Math.max(0, target - now);
  var cls  = "step" + (isLive ? " live" : "") + (done ? " done" : "");
  var numHtml = done
    ? '<b>' + now + '/' + target + '</b>・達成'
    : now + '/' + '<b>' + target + '</b>・あと ' + left;
  return '<div class="' + cls + '">'
       +   '<span class="when">' + goal.until + '</span>'
       +   '<span class="mid">'
       +     '<span class="num">' + numHtml + '</span>'
       +     '<span class="bar"><i style="width:' + pct + '%"></i></span>'
       +   '</span>'
       + '</div>';
}

// --- ホームの目標＝「今の時間帯のぶんだけ」1段（19時以降はおつかれさま） ---
function renderGoalHome(d){
  var now = d.talkedNow;
  var goals = d.timeGoals;
  var band = currentBandIndex(goals);
  var h = new Date().getHours();
  var box = document.getElementById("gStepNow");

  if (h >= goals[goals.length - 1].hourEnd){
    // 19時以降＝静かに締める
    box.innerHTML = '<div class="step done">'
      + '<span class="when">きょう</span>'
      + '<span class="mid"><span class="num">話した数 <b>' + now + '</b> ・ おつかれさま</span></span>'
      + '</div>';
    return;
  }
  // 今の段だけ（必ず live で強調）
  box.innerHTML = stepHtml(goals[band], now, true);
}

// --- 目標の専門画面＝3段すべて。今いる段を強調 ---
function renderGoalAll(d){
  var now = d.talkedNow;
  var goals = d.timeGoals;
  var band = currentBandIndex(goals);
  var html = "";
  for (var i = 0; i < goals.length; i++){
    html += stepHtml(goals[i], now, i === band);
  }
  document.getElementById("gStepsAll").innerHTML = html;
}

// --- 順位データを多い順に並べた配列を返す ---
function sortedRanking(d){
  return d.ranking.slice().sort(function(a,b){ return b.cnt - a.cnt; });
}

// --- ホームの左帯：今月のアポ順位（小さく・自分は朱で強調） ---
function renderRankHome(d){
  var list = sortedRanking(d);
  var html = "";
  for (var i = 0; i < list.length; i++){
    var r = list[i];
    html += '<li class="' + (r.me ? "me" : "") + '">'
          + '<span class="pos">' + (i + 1) + '</span>'
          + '<span class="who">' + r.who + '</span>'
          + '<span class="cnt">' + r.cnt + '</span>'
          + '</li>';
  }
  document.getElementById("rankList").innerHTML = html;
}

// --- 順位の専門画面：フル順位表（全員・件数・自分強調） ---
function renderRankFull(d){
  var list = sortedRanking(d);
  var html = "";
  for (var i = 0; i < list.length; i++){
    var r = list[i];
    html += '<li class="' + (r.me ? "me" : "") + '">'
          + '<span class="pos">' + (i + 1) + '</span>'
          + '<span class="who">' + r.who + (r.me ? '（あなた）' : '') + '</span>'
          + '<span class="cnt"><b>' + r.cnt + '</b>件</span>'
          + '</li>';
  }
  document.getElementById("rankFull").innerHTML = html;
}

// --- ③ ホームから1軒記録：#mapに入らず現在地にピン→マークを選ぶ（2タップ） ---
// 保存先・マーク・関数は #map と同じ（apo.pins.v1 / 同じMARKS / savePins / renderPins を流用＝二重実装しない）
var homePickState = { mark:"", lat:null, lng:null, acc:null, sample:false };
function openHomePick(){
  homePickState = { mark:"", lat:null, lng:null, acc:null, sample:false };
  var sheet = document.getElementById("homePick");
  var veil  = document.getElementById("homePickVeil");
  var meta  = document.getElementById("homePickMeta");
  var memo  = document.getElementById("homePickMemo");
  // チップ＝#mapと同じ仮マーク一覧
  document.getElementById("homePickChips").innerHTML = MARKS.map(function(mk){
    return '<span class="chip" data-mk="'+mk.key+'">'+mk.label+'</span>';
  }).join("");
  memo.value = ""; memo.style.display = "none";
  meta.textContent = "現在地を確認中…";
  veil.classList.add("show"); sheet.classList.add("show");
  // チップ選択＝現在地ピンを即確定（マークを1つ選ぶ＝確定）
  document.getElementById("homePickChips").querySelectorAll(".chip").forEach(function(b){
    b.addEventListener("click", function(){
      if(homePickState.lat==null) return;     // 位置確定前は押せない
      document.getElementById("homePickChips").querySelectorAll(".chip").forEach(function(x){ x.classList.remove("on"); });
      b.classList.add("on"); homePickState.mark = b.getAttribute("data-mk");
      confirmHomePin();
    });
  });
  // 現在地を取る（#mapと同じ getHere・記録時のGPS）
  getHere(function(h){
    homePickState.lat=h.lat; homePickState.lng=h.lng; homePickState.acc=h.acc; homePickState.sample=h.sample;
    hereLatLng=[h.lat,h.lng]; hereAcc=h.acc; drawHere();
    meta.textContent = (h.sample ? "サンプル位置（本番はHTTPSで実測）" : "現在地")
      + " "+h.lat.toFixed(5)+", "+h.lng.toFixed(5)
      + (h.acc!=null?"（精度 約"+h.acc+"m）":"") + " ・ マークを1つ選ぶ＝記録";
  });
}
// マークを選んだ＝現在地にピンを確定（その後メモ任意）。#mapと同じ保存（savePins/renderPins）
function confirmHomePin(){
  var s = homePickState;
  if(s.lat==null || !s.mark) return;
  var iso = new Date().toISOString();
  var p = { lat:s.lat, lng:s.lng, acc:s.acc, mark:s.mark, comment:"", created:iso, updated:iso };
  pins.push(p); savePins(); renderPins(); fitHomeView();
  s._pin = p;
  // 確定後に「メモ（任意）」を出す
  var memo = document.getElementById("homePickMemo");
  memo.style.display = "block"; memo.focus();
  document.getElementById("homePickMeta").textContent = "記録しました（"+markOf(s.mark).label+"）。メモは任意です。";
  document.getElementById("homePickRow").innerHTML =
    '<span class="mini primary" data-act="memoSave">メモを保存して閉じる</span>'
    +'<span class="mini" data-act="cancel">そのまま閉じる</span>';
  wireHomePickRow();
}
function closeHomePick(){
  document.getElementById("homePick").classList.remove("show");
  document.getElementById("homePickVeil").classList.remove("show");
  // 行を初期状態（やめる）に戻す
  document.getElementById("homePickRow").innerHTML = '<span class="mini" data-act="cancel">やめる</span>';
  document.getElementById("homePickMemo").style.display = "none";
  wireHomePickRow();
}
function wireHomePickRow(){
  document.getElementById("homePickRow").querySelectorAll(".mini").forEach(function(b){
    b.addEventListener("click", function(){
      var act = b.getAttribute("data-act");
      if(act==="memoSave" && homePickState._pin){
        homePickState._pin.comment = document.getElementById("homePickMemo").value.trim();
        homePickState._pin.updated = new Date().toISOString();
        savePins(); renderPins();
      }
      closeHomePick();
    });
  });
}
function onRec(){ openHomePick(); }

/* ── 画面切替（SPA風・#rank/#goal/#map ハッシュ対応） ────────────── */
var SCREENS = ["home", "rank", "goal", "map"];
function showScreen(name){
  if (SCREENS.indexOf(name) < 0) name = "home";
  for (var i = 0; i < SCREENS.length; i++){
    var el = document.getElementById(SCREENS[i]);
    if (el) el.classList.toggle("show", SCREENS[i] === name);
  }
  // 地図は表示された瞬間に大きさを取り直す（隠れている間は0pxで描けないため）
  if (name === "map" && typeof onMapShown === "function") onMapShown();
  else if (name === "home" && typeof onHomeShown === "function") onHomeShown();
}
// URLハッシュを正として反映（#rank等／空ならホーム）
function syncFromHash(){
  var h = (location.hash || "").replace("#", "");
  showScreen(h || "home");
}
// ゾーン/戻るボタンのタップ＝ハッシュを書き換える（履歴に残る＝端末の戻るでも戻れる）
function goTo(name){
  location.hash = (name === "home") ? "" : ("#" + name);
}

/* =========================================================================
   ★ 本物の地図（Leaflet＋無料の航空写真）＋マーク式ピン（D-136準拠）
   ・既定＝Esri World Imagery（深く拡大できる）／切替＝国土地理院 航空写真
   ・現在地マーカー＋精度円。ピンは2タップ（📍ここにピン→マークを選ぶ）で確定。
   ・地図を直接タップでも任意の場所に置ける（その家に立ってない時用）。
   ・ピンは localStorage（apo.pins.v1）に保存。開き直しても残る。
   ・更新（D-136＝更新時もGPSを取る）：マーク変更／コメント／📍位置を取り直す／削除
   ========================================================================= */

// ── 仮のマーク一覧（あとでオーナーが直す前提。色は管理マップと同系統） ──
var MARKS = [
  {key:"rusu",     icon:"🏠", color:"#8a93ad", label:"🏠留守"},
  {key:"kotowari", icon:"🚫", color:"#ff6b6b", label:"🚫断られた"},
  {key:"hanaseta", icon:"💬", color:"#ffc857", label:"💬話せた"},
  {key:"mikomi",   icon:"☀",  color:"#5b8cff", label:"☀見込み(太陽光あり)"},
  {key:"apo",      icon:"🎯", color:"#3ddc97", label:"🎯アポ獲得"},
  {key:"saihou",   icon:"🔁", color:"#cbb27a", label:"🔁再訪"}
];
function markOf(key){ for(var i=0;i<MARKS.length;i++){ if(MARKS[i].key===key) return MARKS[i]; } return MARKS[2]; }

// ── localStorage（各ピン＝{lat,lng,acc,mark,comment,created,updated}） ──
var LS_PINS = "apo.pins.v1";
var pins = [];
function loadPins(){
  try{ pins = JSON.parse(localStorage.getItem(LS_PINS) || "[]"); }catch(e){ pins = []; }
  if(!Array.isArray(pins)) pins = [];
}
function savePins(){
  try{ localStorage.setItem(LS_PINS, JSON.stringify(pins)); }catch(e){}
}
// コメントを安全にHTMLへ
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

// ── 地図タイル（無料・キー不要）。URLはコードに直書きで良い＝APIキーではない ──
function esriTiles(){ return L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { maxZoom:21, maxNativeZoom:19, attribution:"Esri World Imagery" }); }   // {z}/{y}/{x}＝yが先。z19が実データの限界→以降は拡大表示(maxNativeZoom)で灰色"not available"を出さない
function gsiTiles(){ return L.tileLayer(
  "https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg",
  { maxZoom:21, maxNativeZoom:18, attribution:"地理院タイル（国土地理院）" }); }

// GPSが取れない時のフォールバック（東京近郊住宅地・管理マップと同じあたり）
var SAMPLE_CENTER = [35.7010, 139.5500];
var usingSample = false;   // true＝サンプル位置（本番HTTPSで実測）

// 現在地（取れたら保持）。取れなければサンプル中心。
var hereLatLng = null, hereAcc = null;

// ── 現在地を取る（成功で {lat,lng,acc}／失敗でサンプルにフォールバック） ──
function getHere(cb){
  if(!navigator.geolocation){
    usingSample = true;
    cb({lat:SAMPLE_CENTER[0], lng:SAMPLE_CENTER[1], acc:40, sample:true});
    return;
  }
  navigator.geolocation.getCurrentPosition(function(pos){
    usingSample = false;
    cb({ lat:pos.coords.latitude, lng:pos.coords.longitude,
         acc:Math.round(pos.coords.accuracy||30), sample:false });
  }, function(){
    // 許可拒否・file:// 等 → サンプル位置にフォールバック（少しずらして毎回同じ点に積まない）
    usingSample = true;
    var jitter = (Math.random()-0.5)*0.0014;
    cb({lat:SAMPLE_CENTER[0]+jitter, lng:SAMPLE_CENTER[1]+jitter, acc:40, sample:true});
  }, {enableHighAccuracy:true, timeout:8000, maximumAge:5000});
}

/* ── 現在地の“表示だけ”リアルタイム追従（watchPosition）──────────────
   ・地図上の自分の点が動くたび追従＝Googleマップの青い点のように。
   ・⚠️ 記録（ピンの保存）は従来どおりタップ/ピンを置いた時のGPSだけ。
     watchは“表示”のみ＝常時追跡・常時保存はしない（プライバシー/最小収集）。
   ・画面が隠れたら止め、戻ったら再開（電池配慮）。使えない/拒否時はサンプルで静止。 */
var watchId = null;
function startWatch(){
  if(watchId!=null) return;                 // 二重起動しない
  if(!navigator.geolocation) return;        // 使えない＝既存の静止フォールバックのまま
  if(document.visibilityState === "hidden") return;
  watchId = navigator.geolocation.watchPosition(function(pos){
    usingSample = false;
    hereLatLng = [pos.coords.latitude, pos.coords.longitude];
    hereAcc = Math.round(pos.coords.accuracy||30);
    drawHere();                             // 表示だけ更新（保存はしない）
  }, function(){
    // 拒否/失敗＝watchを畳む（既存のサンプル静止表示のまま＝騒がない）
    stopWatch();
  }, {enableHighAccuracy:true, maximumAge:3000, timeout:12000});
}
function stopWatch(){
  if(watchId!=null && navigator.geolocation){ navigator.geolocation.clearWatch(watchId); }
  watchId = null;
}
// 画面が隠れたら止め、戻ったら再開（電池配慮）
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "hidden") stopWatch();
  else startWatch();
});

// ── 地図インスタンス（ホーム小プレビュー／全画面）と各レイヤ ──
var fullMap=null, homeMap=null;
var pinLayer=null, hereLayer=null;          // 全画面用
var homePinLayer=null, homeHereLayer=null;  // ホーム用
var placing=false;                          // 「📍 ここにピン」or地図タップの仮置き待ち

// 現在地マーカー＋精度円を描く（両マップ）
function drawHere(){
  if(!hereLatLng) return;
  [{m:fullMap, lyr:hereLayer}, {m:homeMap, lyr:homeHereLayer}].forEach(function(o){
    if(!o.m || !o.lyr) return;
    o.lyr.clearLayers();
    if(hereAcc!=null){
      L.circle(hereLatLng, {radius:hereAcc, color:"#cbb27a", weight:1.5, opacity:.8,
        fillColor:"#cbb27a", fillOpacity:.10, dashArray:"4 4"}).addTo(o.lyr);
    }
    var dot = L.divIcon({className:"here-dot", html:"<span></span>", iconSize:[14,14], iconAnchor:[7,7]});
    L.marker(hereLatLng, {icon:dot, interactive:false}).addTo(o.lyr);
  });
}

// 1本のピンを地図に描く（全画面＝編集できる／ホーム＝見るだけ）
function drawOnePin(p, lyr, editable){
  var mk = markOf(p.mark);
  var icon = L.divIcon({ className:"pinmark",
    html:'<span style="color:'+mk.color+';">'+mk.icon+'</span>',
    iconSize:[26,26], iconAnchor:[13,13] });
  var m = L.marker([p.lat,p.lng], {icon:icon});
  if(p.comment){
    m.bindTooltip(esc(p.comment), {permanent:true, direction:"right", className:"pin-label", offset:[10,0]});
  }
  if(editable){ m.on("click", function(){ openEditPin(p); }); }
  m.addTo(lyr);
}
// すべてのピンを描き直す（両マップ）
function renderPins(){
  if(pinLayer){ pinLayer.clearLayers(); pins.forEach(function(p){ drawOnePin(p, pinLayer, true); }); }
  if(homePinLayer){ homePinLayer.clearLayers(); pins.forEach(function(p){ drawOnePin(p, homePinLayer, false); }); }
}

// ── マークを選ぶチップ＋メモ（任意）のフォームHTML ──
function markFormHtml(opts){
  var sel = opts.mark || "";
  var chips = MARKS.map(function(mk){
    return '<span class="chip'+(mk.key===sel?" on":"")+'" data-mk="'+mk.key+'">'+mk.label+'</span>';
  }).join("");
  var meta = "";
  if(opts.lat!=null){
    meta = "位置 "+opts.lat.toFixed(5)+", "+opts.lng.toFixed(5)
         + (opts.acc!=null?"（精度 約"+opts.acc+"m）":"")
         + (opts.time?" ・ "+opts.time:"")
         + (opts.sample?" ・ サンプル位置（本番はHTTPSで実測）":"");
  }
  // 🧭 ここへ行く＝スマホの地図アプリでこのピンへのルート（ナビ）を開く（出発地は地図アプリ側が現在地を自動）
  var dirUrl = "https://www.google.com/maps/dir/?api=1&destination="
             + (opts.lat!=null ? (opts.lat+","+opts.lng) : "");
  var goBtn = (opts.lat!=null)
    ? '<a class="mini go" href="'+dirUrl+'" target="_blank" rel="noopener">🧭 ここへ行く</a>'
    : "";
  var rows = opts.isNew
    ? '<span class="mini primary" data-act="save">このマークで確定</span>'
      +'<span class="mini" data-act="cancel">やめる</span>'
    : '<span class="mini primary" data-act="save">保存</span>'
      + goBtn
      +'<span class="mini retake" data-act="retake">📍 ここで位置を取り直す</span>'
      +'<span class="mini danger" data-act="del">削除</span>';
  return '<div class="markform">'
    +   '<div class="ttl">'+(opts.isNew?"マークを選ぶ":"このピンを直す")+'</div>'
    +   (meta?'<div class="meta">'+esc(meta)+'</div>':'')
    +   '<div class="chips">'+chips+'</div>'
    +   '<textarea rows="2" placeholder="メモ（任意・打たなくてもOK）">'+esc(opts.comment||"")+'</textarea>'
    +   '<div class="row">'+rows+'</div>'
    +   (goBtn?'<div class="gonote">ルートはスマホの地図アプリで開きます（¥0）</div>':'')
    + '</div>';
}

// チップの選択結線（共通）。選んだキーを返す箱を更新
function wireChips(el, state){
  el.querySelectorAll(".chip").forEach(function(b){
    b.addEventListener("click", function(){
      el.querySelectorAll(".chip").forEach(function(x){ x.classList.remove("on"); });
      b.classList.add("on"); state.mark = b.getAttribute("data-mk");
    });
  });
}

// ── ① 新規ピン：現在地 or タップ地点に仮置き → マークを選ぶ → 確定 ──
function openNewPin(lat, lng, acc, sample){
  var now = new Date();
  var timeLabel = ("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2);
  var state = { mark:"" };
  var html = markFormHtml({isNew:true, lat:lat, lng:lng, acc:acc, time:timeLabel, sample:sample});
  var popup = L.popup({maxWidth:280, minWidth:230, closeButton:true})
    .setLatLng([lat,lng]).setContent(html).openOn(fullMap);
  var el = popup.getElement();
  wireChips(el, state);
  el.querySelector('[data-act="save"]').addEventListener("click", function(){
    if(!state.mark){ alert("マークを1つ選んでください（仮のマークでOK）。"); return; }
    var comment = el.querySelector("textarea").value.trim();
    var iso = now.toISOString();
    pins.push({ lat:lat, lng:lng, acc:acc, mark:state.mark, comment:comment, created:iso, updated:iso });
    savePins(); renderPins(); fullMap.closePopup(popup);
  });
  el.querySelector('[data-act="cancel"]').addEventListener("click", function(){ fullMap.closePopup(popup); });
}

// 「📍 ここにピン」＝現在地を取って仮置き（GPSの緯度経度・精度・時刻）
function placeHereByGps(){
  var tip = document.getElementById("addPinTip");
  if(tip) tip.textContent = "現在地を確認中…";
  getHere(function(h){
    hereLatLng = [h.lat, h.lng]; hereAcc = h.acc; drawHere();
    fullMap.setView(hereLatLng, Math.max(fullMap.getZoom(), 18));
    if(tip) tip.textContent = h.sample
      ? "サンプル位置に仮置き（本番はHTTPSで実測）。マークを選んでください。"
      : "現在地に仮置きしました。マークを選んでください。";
    openNewPin(h.lat, h.lng, h.acc, h.sample);
  });
}

// ── ② 既存ピンの更新：マーク変更／コメント／📍位置取り直し／削除 ──
function openEditPin(p){
  var state = { mark:p.mark };
  var t = new Date(p.updated||p.created||Date.now());
  var timeLabel = ("0"+t.getHours()).slice(-2)+":"+("0"+t.getMinutes()).slice(-2);
  function content(){
    return markFormHtml({isNew:false, mark:p.mark, comment:p.comment,
      lat:p.lat, lng:p.lng, acc:p.acc, time:timeLabel,
      sample:false});
  }
  var popup = L.popup({maxWidth:300, minWidth:240, closeButton:true})
    .setLatLng([p.lat,p.lng]).setContent(content()).openOn(fullMap);
  var el = popup.getElement();
  wireChips(el, state);
  el.querySelector('[data-act="save"]').addEventListener("click", function(){
    p.mark = state.mark; p.comment = el.querySelector("textarea").value.trim();
    p.updated = new Date().toISOString();
    savePins(); renderPins(); fullMap.closePopup(popup);
  });
  // 📍 位置を取り直す（D-136＝更新時もGPSを取る＝家を正確に）
  el.querySelector('[data-act="retake"]').addEventListener("click", function(){
    // 編集中のコメント／マークは先に控える
    var keepMark = state.mark, keepComment = el.querySelector("textarea").value.trim();
    getHere(function(h){
      p.lat=h.lat; p.lng=h.lng; p.acc=h.acc; p.mark=keepMark; p.comment=keepComment;
      p.updated=new Date().toISOString();
      hereLatLng=[h.lat,h.lng]; hereAcc=h.acc; drawHere();
      savePins(); renderPins(); fullMap.closePopup(popup);
      fullMap.setView([h.lat,h.lng], Math.max(fullMap.getZoom(),18));
    });
  });
  el.querySelector('[data-act="del"]').addEventListener("click", function(){
    pins = pins.filter(function(x){ return x!==p; });
    savePins(); renderPins(); fullMap.closePopup(popup);
  });
}

// ── 凡例（仮マークの色見本）をホームに描く ──
function renderHomeLegend(){
  var box = document.getElementById("homeLegend");
  if(!box) return;
  // 場所を取らないので主要4つだけ小さく
  var show = ["hanaseta","mikomi","apo","rusu"];
  box.innerHTML = show.map(function(k){
    var mk = markOf(k);
    return '<span><i class="dot" style="background:'+mk.color+'"></i>'+mk.icon+'</span>';
  }).join("");
}

// ── 地図の初期化（全画面・1回だけ）。表示された瞬間に呼ぶ ──
function initFullMap(){
  if(fullMap) return;
  var esri=esriTiles(), gsi=gsiTiles();
  fullMap = L.map("fullMap", {scrollWheelZoom:true, maxZoom:21, layers:[esri]})
    .setView(SAMPLE_CENTER, 18);
  // 既定＝Esri航空写真／切替で国土地理院 航空写真（D-136）
  L.control.layers({ "航空写真（詳細・Esri）":esri, "航空写真（国土地理院）":gsi },
    null, {collapsed:true}).addTo(fullMap);
  pinLayer = L.layerGroup().addTo(fullMap);
  hereLayer = L.layerGroup().addTo(fullMap);
  renderPins();

  // 地図を直接タップ＝任意の場所にピン（その家に立ってない時用）
  fullMap.on("click", function(e){
    openNewPin(e.latlng.lat, e.latlng.lng, null, false);
  });

  // 開いた時に現在地を取って中心へ（精度円つき）
  getHere(function(h){
    hereLatLng=[h.lat,h.lng]; hereAcc=h.acc; drawHere();
    // 既にピンが有るならピン全体が見えるよう、無ければ現在地へ寄る
    if(pins.length===0) fullMap.setView(hereLatLng, 18);
    var note=document.getElementById("mapNote");
    if(note && h.sample){
      note.innerHTML = '※いまは<b>サンプル位置</b>（本番はHTTPS＝GitHub Pagesで実測）。マークの種類も<b>仮</b>です（あとでオーナーが直します）。';
    }
  });
}

// ── ホームの小プレビュー（触らせない・自分のピン＋現在地が乗る） ──
function initHomeMap(){
  if(homeMap) return;
  homeMap = L.map("homeMap", {
    zoomControl:false, attributionControl:false,
    dragging:false, scrollWheelZoom:false, doubleClickZoom:false,
    boxZoom:false, keyboard:false, tap:false, touchZoom:false,
    layers:[esriTiles()]
  }).setView(SAMPLE_CENTER, 17);
  homePinLayer = L.layerGroup().addTo(homeMap);
  homeHereLayer = L.layerGroup().addTo(homeMap);
  renderPins();
  // 現在地が分かればそこを中心に、ピンが有れば全体が入るように
  getHere(function(h){
    hereLatLng=[h.lat,h.lng]; hereAcc=h.acc; drawHere();
    fitHomeView();
  });
}
function fitHomeView(){
  if(!homeMap) return;
  var pts = pins.map(function(p){ return [p.lat,p.lng]; });
  if(hereLatLng) pts.push(hereLatLng);
  if(pts.length>=2){ homeMap.fitBounds(pts, {padding:[24,24], maxZoom:18}); }
  else if(pts.length===1){ homeMap.setView(pts[0], 17); }
}

// 画面が表示された瞬間に大きさを取り直す（隠れている間は描けない）
function onMapShown(){
  initFullMap();
  startWatch();   // 現在地“表示だけ”リアルタイム追従（記録はタップ時のみ）
  setTimeout(function(){ if(fullMap){ fullMap.invalidateSize(); renderPins(); drawHere(); } }, 60);
}
function onHomeShown(){
  initHomeMap();
  startWatch();   // ホームのプレビューでも自分の点が動く（表示のみ）
  setTimeout(function(){ if(homeMap){ homeMap.invalidateSize(); renderPins(); drawHere(); fitHomeView(); } }, 60);
}
