<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- PWAホーム追加に馴染む（夕暮れの墨色） -->
<meta name="theme-color" content="#1a1815" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>きょうの自分 ― ハヤテ</title>

<!-- 手書き風フォント（Google Fonts CDN 1本のみ・読めなくても fallback で成立） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Kurenaido&display=swap" rel="stylesheet">

<!-- 本物の地図＝Google Maps JavaScript API（高解像度の航空写真 hybrid）。鍵は下のscript1本のみ -->

<style>
  /* ============================================================
     ★デザインの型＝ここを揃える（20画面で統一する見本）
     色も寸法もすべて CSS変数で定義。他画面はこの :root をコピーすれば
     同じ温度・同じ余白・同じ角丸で作れる＝「正直な鏡」の一貫性。
     ============================================================ */
  :root{
    /* ── 色：夕暮れの和紙＝墨と土の色（「一筆」の世界観を継承）── */
    --paper:#1a1815;        /* 背景：夜に向かう墨 */
    --paper2:#211e1a;
    --card:#252119;         /* 和紙カード */
    --card-edge:#3a342a;    /* カードの縁・仕切り線 */
    --ink:#f0e9da;          /* 墨の白文字（主役の文字） */
    --ink-soft:#b8ad97;     /* 薄墨（副文字） */
    --ink-faint:#857a64;    /* かすれ（注記・ラベル） */
    --vermilion:#d98a5b;    /* 朱・夕陽（行動＝主役の差し色） */
    --vermilion-soft:#e3a378;
    --gold:#cbb27a;         /* ほのかな金（称号・見出し） */
    --leaf:#8fae7d;         /* 草の緑（達成・控えめ） */

    /* ── 寸法：角丸・余白・文字（部品の基準）── */
    --r-lg:16px;            /* 大カードの角丸 */
    --r-md:12px;           /* 中カードの角丸 */
    --r-sm:9px;            /* バッジ・小物の角丸 */
    --gap:6px;             /* ゾーン間の余白（圧縮＝隙間ゼロでギュッと） */
    --pad:9px;            /* カード内の余白（圧縮） */
    --fs-title:15px;      /* 見出し */
    --fs-body:13.5px;     /* 本文 */
    --fs-small:11.5px;    /* 注記・ラベル */
    --fs-num:32px;        /* 主役の数字 */
    --bar-h:10px;         /* 進捗バーの高さ */
  }

  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-text-size-adjust:100%;}
  html,body{height:100%; overflow:hidden;}
  /* 土台(html)も墨色で塗る＝万一アプリが下端まで届かなくても、すき間が白く出ない */
  html{ background:var(--paper); }
  body{
    background:
      radial-gradient(120% 70% at 50% -10%, #2a241c 0%, var(--paper) 55%, var(--paper2) 100%);
    color:var(--ink);
    font-family:"Zen Kurenaido","Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.55;
  }

  /* ============================================================
     画面全体＝スマホ縦1枚。手描きの3ゾーンを CSS Grid で再現。
       ┌──────┬──────────────┐
       │      │  右上：目標 (1/3)   │   左列：幅18〜20%・全高（ランキング）
       │ ラン │──────────────│   右列：上1/3=目標／下2/3=地図
       │ キン │                  │
       │ グ   │  右下：地図 (2/3)   │
       └──────┴──────────────┘
     下に細いバー＝入力プレースホルダ（手描きに無い＝置き場所は要相談）
     safe-area対応（上ノッチ／下ホームバーを避ける）
     ============================================================ */
  .app{
    height:100svh; height:100dvh;        /* 実際に見えている高さ(dvh)に追従＝下に白いすき間を作らない（svhは小さく見積もり過ぎて余白が出るのでフォールバックに） */
    max-width:480px; margin:0 auto;
    display:flex; flex-direction:column;
    /* 下バー削除＝3ゾーンが下端まで使う（safe-areaぶんだけ下に余白） */
    padding:env(safe-area-inset-top) 6px calc(6px + env(safe-area-inset-bottom)) 6px;
  }
  @supports not (height:100dvh){
    .app{ height:100vh; }                /* 古い端末フォールバック */
  }

  /* 上：3ゾーンの本体（残り全高を占める） */
  .stage{
    flex:1 1 auto;
    display:grid;
    /* ★左帯＝約21%（順位を少し広く）／右＝残り */
    grid-template-columns:21% 1fr;
    grid-template-rows:1fr;
    gap:var(--gap);
    min-height:0;            /* 子のはみ出し防止 */
    /* 下バー削除＝隙間なく下端まで */
  }

  /* 右列を上＝目標（小さく）・下＝地図（縦に最大化）に分ける入れ物 */
  .right{
    display:grid;
    /* ★右上 目標＝auto（中身ぶんだけ）／右下 地図＝1fr（残り全部＝縦最大） */
    grid-template-rows:auto 1fr;
    gap:var(--gap);
    min-height:0;
  }

  /* ── 共通カード（部品）──────────────────── */
  .card{
    background:
      linear-gradient(180deg, rgba(255,250,238,.04), rgba(0,0,0,.06)),
      var(--card);
    border:1px solid var(--card-edge);
    border-radius:var(--r-lg);
    box-shadow:0 14px 34px -22px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,245,225,.04);
    overflow:hidden;
  }

  /* ── 左：縦帯（今月のアポ件数の順位）──────────────── */
  .rank{
    display:flex; flex-direction:column;
    padding:7px 5px;
    position:relative;
  }
  /* 小さな見出し（"ランキング"の語は出さない＝アイコン＋「今月のアポ」） */
  .rank .cap{
    text-align:center;
    font-family:"Yuji Syuku",serif;
    font-size:11px; letter-spacing:.04em;
    color:var(--gold);
    margin-bottom:6px;
    opacity:.92;
    line-height:1.3;
  }
  .rank .cap .ic{ font-size:13px; display:block; margin-bottom:1px; }
  /* 区切りの細線 */
  .rank .hr{
    height:1px; margin:2px 2px 8px;
    background:linear-gradient(90deg,transparent,var(--card-edge),transparent);
  }
  /* 順位の行＝縦いっぱいを均等に埋める（隙間ゼロでギュッと） */
  .rank ol{ list-style:none; display:flex; flex-direction:column; gap:4px; flex:1 1 auto; min-height:0; }
  .rank li{
    display:flex; align-items:center; gap:4px;
    font-size:12px; color:var(--ink-soft);
    background:rgba(255,250,238,.02);
    border:1px solid rgba(58,52,42,.6);
    border-radius:var(--r-sm);
    padding:0 5px;
    flex:1 1 0; min-height:0;     /* 行が縦を均等に分け合う＝白い隙間を残さない */
  }
  .rank li .pos{
    font-feature-settings:"tnum";
    color:var(--ink-faint); min-width:13px; text-align:center; font-size:11px;
  }
  .rank li .who{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* 件数＝主役の数字。パッと見で分かるよう大きめ */
  .rank li .cnt{ color:var(--ink-soft); font-size:15px; font-weight:700; font-feature-settings:"tnum"; }
  /* 自分の行＝そっと朱で印（責めない・主役は本人） */
  .rank li.me{
    background:linear-gradient(180deg, rgba(217,138,91,.14), rgba(217,138,91,.04));
    border-color:rgba(217,138,91,.45);
    color:var(--vermilion-soft);
  }
  .rank li.me .pos{ color:var(--vermilion-soft); }
  .rank li.me .cnt{ color:var(--vermilion-soft); }

  /* ── 右上：目標（〜13時／〜17時／〜19時の3段・話した数）──────── */
  .goal{
    padding:var(--pad);
    display:flex; flex-direction:column; justify-content:center;
  }
  .goal .h{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:8px;
  }
  .goal .h .t{
    font-family:"Yuji Syuku",serif; font-size:var(--fs-title);
    color:var(--gold); letter-spacing:.06em;
  }
  .goal .h .sub{ font-size:var(--fs-small); color:var(--ink-faint); }

  /* ── ① ホームの目標＝達成の数字を主役級に大きく（パッと見で「今/目標」）──
     特大「5/10」＋添えの「あと5」。時間帯ラベル(〜19時)は小さく。余白を数字で埋める。 */
  .goal .bignow{
    display:flex; align-items:center; justify-content:center; gap:10px;
    text-align:center; padding:2px 0;
  }
  .goal .bignow .when{
    flex:0 0 auto; font-size:11px; color:var(--ink-faint);
    letter-spacing:.02em; line-height:1.2; max-width:46px;
  }
  .goal .bignow .figs{ flex:0 0 auto; line-height:1; }
  /* 特大の達成数字「5/10」＝余白を埋める主役 */
  .goal .bignow .big{
    font-feature-settings:"tnum"; font-weight:700;
    font-size:clamp(40px, 13vw, 60px); line-height:.96;
    color:var(--vermilion-soft);
    text-shadow:0 2px 14px rgba(217,138,91,.28);
  }
  .goal .bignow .big .of{ color:var(--ink-faint); font-size:.52em; font-weight:600; }
  /* 添えの「あと5」/「達成」＝小さく下に */
  .goal .bignow .left{
    margin-top:5px; font-size:13px; color:var(--ink-soft); letter-spacing:.02em;
  }
  .goal .bignow .left b{ color:var(--vermilion-soft); font-weight:700; font-size:15px; }
  /* 進捗の細バー＝大数字の下に薄く（パッと見の補助） */
  .goal .bignow + .bar{ margin-top:10px; }
  /* 達成済みの色（静かに金/緑） */
  .goal .bignow.done .big{ color:var(--leaf); text-shadow:0 2px 14px rgba(143,174,125,.26); }
  .goal .bignow.done .left b{ color:var(--leaf); }
  .goal .bignow.done + .bar > i{
    background:linear-gradient(90deg, var(--leaf), var(--gold));
    box-shadow:0 0 8px rgba(143,174,125,.4);
  }
  /* 3段の時間チェックポイント */
  .goal .steps{ display:flex; flex-direction:column; gap:6px; }
  .goal .step{
    display:flex; align-items:center; gap:8px;
    padding:5px 7px;
    border:1px solid rgba(58,52,42,.6);
    border-radius:var(--r-sm);
    background:rgba(255,250,238,.02);
  }
  .goal .step .when{
    flex:0 0 auto; width:46px;
    font-size:var(--fs-small); color:var(--ink-faint);
    letter-spacing:.02em;
  }
  .goal .step .mid{ flex:1; min-width:0; }
  .goal .step .num{
    font-feature-settings:"tnum"; font-size:11.5px; color:var(--ink-soft);
    margin-bottom:3px;
  }
  .goal .step .num b{ color:var(--ink-soft); font-weight:400; }
  /* 進捗バー（部品）＝朱で満ちる */
  .bar{
    height:var(--bar-h); border-radius:999px;
    background:rgba(255,250,238,.06);
    border:1px solid var(--card-edge);
    overflow:hidden;
  }
  .bar > i{
    display:block; height:100%; border-radius:999px;
    background:linear-gradient(90deg, var(--vermilion), var(--vermilion-soft));
    box-shadow:0 0 8px rgba(217,138,91,.4);
    transition:width .6s ease;
  }
  /* 今の時刻に当たる段＝そっと朱で強調（責めない） */
  .goal .step.live{
    background:linear-gradient(180deg, rgba(217,138,91,.13), rgba(217,138,91,.03));
    border-color:rgba(217,138,91,.45);
  }
  .goal .step.live .when{ color:var(--vermilion-soft); }
  .goal .step.live .num{ color:var(--ink); font-size:12.5px; }
  .goal .step.live .num b{ color:var(--vermilion-soft); font-weight:600; }
  /* 達成した段＝静かに金/緑で祝う */
  .goal .step.done .when{ color:var(--leaf); }
  .goal .step.done .num b{ color:var(--leaf); }
  .goal .step.done .bar > i{
    background:linear-gradient(90deg, var(--leaf), var(--gold));
    box-shadow:0 0 8px rgba(143,174,125,.4);
  }

  /* ── 右下：地図（本物の航空写真＝Google Maps hybrid。ホームも“触れる地図”＝家タップでピン）──── */
  .map{
    position:relative;
    background:#211e1a;   /* タイル読込前の下地（墨） */
  }
  /* 実際の地図が入る器（Google Mapsのキャンバス） */
  .map .gmap{ position:absolute; inset:0; z-index:1; }
  /* ホームの地図も“触れる地図”＝指でパン・拡大OK。家タップ＝その地点にピン */
  /* 🏷️ メーカー編集＝地図の隅の小さなボタン（墨地に金・kindsSheetを開く） */
  .map .map-kinds{
    position:absolute; right:8px; top:7px; z-index:4;
    width:30px; height:30px; border-radius:50%;
    font-size:15px; line-height:1; color:var(--gold);
    background:rgba(26,24,21,.78); border:1px solid var(--card-edge);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform .12s ease;
  }
  .map .map-kinds:active{ transform:scale(.94); }
  /* 地図に浮かせる丸ボタン（現在地に戻る／ストリートビュー）＝右下に縦並び（ホーム地図上） */
  .map .map-fabs{
    position:absolute; right:12px; bottom:12px; z-index:5;
    display:flex; flex-direction:column; gap:9px;
  }
  .map .map-fab{
    width:40px; height:40px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    background:linear-gradient(180deg, var(--card), var(--paper2));
    border:1px solid var(--card-edge); color:var(--ink);
    box-shadow:0 4px 12px -4px rgba(0,0,0,.7); transition:transform .12s ease;
  }
  .map .map-fab:active{ transform:scale(.93); }
  /* ── 🧍 ストリートビュー＝アプリ内 全画面オーバーレイ（外部Googleマップに飛ばさない） ── */
  #svPanel{
    position:fixed; inset:0; z-index:2000; display:none;
    background:#0d0c0a;   /* 暗色テーマ（パノラマの下地） */
  }
  #svPanel.show{ display:block; }
  #svPano{ position:absolute; inset:0; width:100%; height:100%; }
  #svPanel .sv-back{
    position:absolute; right:calc(64px + env(safe-area-inset-right)); bottom:calc(18px + env(safe-area-inset-bottom));
    z-index:2010; display:inline-flex; align-items:center; gap:5px;
    background:rgba(26,24,21,.86); border:1px solid var(--card-edge);
    border-radius:var(--r-sm); color:var(--ink); font-size:14px;
    font-family:"Zen Kurenaido",sans-serif;
    padding:9px 14px; cursor:pointer; transition:transform .12s ease;
    box-shadow:0 4px 12px -4px rgba(0,0,0,.7);
  }
  #svPanel .sv-back:active{ transform:scale(.95); }
  /* 帯ラベル「地図」＝左上に小さく（地図の上に浮かす） */
  .map .tag{
    position:absolute; left:8px; top:7px; z-index:3;
    font-family:"Yuji Syuku",serif; font-size:12px; color:var(--gold);
    background:rgba(26,24,21,.72); border:1px solid var(--card-edge);
    border-radius:var(--r-sm); padding:2px 8px; letter-spacing:.1em;
    pointer-events:none;
  }
  /* 凡例（隅に小さく）＝仮マークの色見本 */
  .map .legend{
    position:absolute; left:8px; bottom:8px; z-index:3;
    display:flex; flex-wrap:wrap; gap:4px 8px; font-size:10px; color:var(--ink-soft);
    background:rgba(26,24,21,.72); border:1px solid var(--card-edge);
    border-radius:var(--r-sm); padding:4px 7px; max-width:60%;
    pointer-events:none;
  }
  .map .legend .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:3px; vertical-align:middle; }

  /* Google Mapsのキャンバス＝下地は墨。InfoWindowの中身（.markform）は型で揃える */
  .gm-style{ font-family:"Zen Kurenaido","Hiragino Sans",sans-serif; }
  /* InfoWindowの白い吹き出しを墨+朱+金の型に寄せる（中の文字色が読めるように） */
  .gm-style .gm-style-iw-c{
    background:var(--card)!important; color:var(--ink)!important;
    border:1px solid var(--card-edge); border-radius:var(--r-md)!important;
    box-shadow:0 14px 34px -18px rgba(0,0,0,.85)!important; padding:0!important;
  }
  .gm-style .gm-style-iw-d{ overflow:visible!important; color:var(--ink); }
  .gm-style .gm-style-iw-tc::after{ background:var(--card)!important; }
  .gm-style .gm-style-iw-chr{ height:0; }
  .gm-style .gm-ui-hover-effect{ filter:invert(1) brightness(1.4); top:2px!important; right:2px!important; }
  /* マーク（絵文字アイコン）＝航空写真の上でも沈まない白フチ。Markerのlabelに使う */
  .pinmark{ font-size:22px; line-height:1; text-align:center;
    text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 3px #fff,0 0 4px rgba(0,0,0,.6); }
  /* ピン＝丸いバッジ（色＝状態／中の文字＝メーカーのイニシャル）。航空写真でも沈まない白フチ＋影＋尾 */
  .pin-badge{
    position:relative; width:16px; height:16px; border-radius:50%;
    transform:translate(-50%,-50%);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; line-height:1;
    font-family:"Hiragino Sans",-apple-system,sans-serif;
    border:1.5px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.55);
    text-shadow:0 0 2px rgba(0,0,0,.5);
  }
  .pin-badge .lt{ display:block; }
  .pin-badge.s1 .lt{ font-size:10px; }   /* 1字 */
  .pin-badge.s2 .lt{ font-size:8px; }    /* 2字 */
  .pin-badge.s3 .lt{ font-size:6.5px; }  /* 3字以上 */
  /* 尾（下向きの細い三角）＝ピンらしさ */
  .pin-badge::after{
    content:""; position:absolute; left:50%; bottom:-4px; transform:translateX(-50%);
    border-left:3px solid transparent; border-right:3px solid transparent;
    border-top:5px solid #fff;
  }
  /* status=="" の新規ピン＝中空（塗らない・点線枠）でひと目で未対応とわかる */
  .pin-badge.is-new{
    background:rgba(20,18,15,.35)!important; border-style:dashed; color:rgba(255,255,255,.9);
    box-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .pin-badge.is-new::after{ border-top-color:rgba(255,255,255,.85); }
  /* ピン横の常時ラベル（コメントが有る時だけ・読めるよう墨地に白フチ）＝下に出すOverlay */
  .pin-label{
    background:rgba(26,24,21,.84); color:var(--ink); border:1px solid rgba(240,233,218,.5);
    border-radius:7px; padding:2px 7px; font-size:11px; font-weight:600;
    box-shadow:0 1px 4px rgba(0,0,0,.5); white-space:nowrap;
    font-family:"Zen Kurenaido","Hiragino Sans",sans-serif;
    transform:translate(-50%, 6px); display:inline-block;
  }
  /* 現在地マーカー（脈打つ朱／青ではなく和の差し色）＝Overlayで描く */
  .here-dot{
    width:14px; height:14px; border-radius:50%; transform:translate(-50%,-50%);
    background:var(--leaf); border:2px solid #fff; box-shadow:0 0 0 0 rgba(143,174,125,.6);
    animation:pulse 1.8s ease-out infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(143,174,125,.55); }
    70%{ box-shadow:0 0 0 12px rgba(143,174,125,0); }
    100%{ box-shadow:0 0 0 0 rgba(143,174,125,0); }
  }

  /* （下の「ここにピン」入力バーは削除＝地図タップでピンが付くので不要。
     空いた縦は順位＝左帯と地図＝右下に分配。地図タップ記録のフローは温存。） */

  /* ============================================================
     画面切替（SPA風）＝同一HTML内でホーム⇄専門画面を出し分け。
       ・ホームの3ゾーンはタップで専門画面へ（#rank/#goal/#map）
       ・専門画面は全画面＋◀戻る。型(色/角丸/余白/文字)は全画面共通
     ============================================================ */
  /* 各画面＝重ねて配置し、表示中だけ見せる（フェード/スライド） */
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) 8px calc(8px + env(safe-area-inset-bottom)) 8px;
    max-width:480px; margin:0 auto;
    opacity:0; visibility:hidden;
    transform:translateX(14px);
    transition:opacity .28s ease, transform .28s ease, visibility .28s;
    pointer-events:none;
  }
  .screen.show{
    opacity:1; visibility:visible; transform:translateX(0);
    pointer-events:auto;
  }
  /* ホームは元のflex流し（高さ計算は .app と同じ） */
  #home{ padding-bottom:0; }

  /* ホームの3ゾーン＝「押せる」軽い手応え（タップで少し沈む） */
  .tap{ cursor:pointer; transition:transform .12s ease, box-shadow .12s ease; }
  .tap:active{ transform:scale(.985); box-shadow:0 6px 18px -14px rgba(0,0,0,.8); }
  /* 押せる印＝隅にそっと指マーク（型を壊さない控えめさ） */
  .tap .hint{
    position:absolute; right:7px; top:6px; z-index:4;
    font-size:11px; color:var(--ink-faint); opacity:.6;
    pointer-events:none;
  }
  .rank.tap .hint{ position:absolute; }

  /* ── 専門画面 共通：◀戻る ＋ 見出し ── */
  .topbar{
    flex:0 0 auto;
    display:flex; align-items:center; gap:10px;
    padding:6px 2px 10px 2px;
  }
  .backbtn{
    display:inline-flex; align-items:center; gap:5px;
    background:linear-gradient(180deg, rgba(255,250,238,.05), rgba(0,0,0,.05));
    border:1px solid var(--card-edge);
    border-radius:var(--r-sm);
    color:var(--ink-soft); font-size:13px;
    font-family:"Zen Kurenaido",sans-serif;
    padding:7px 12px; cursor:pointer;
    transition:transform .12s ease;
  }
  .backbtn:active{ transform:scale(.95); }
  .topbar .ttl{
    font-family:"Yuji Syuku",serif; font-size:16px;
    color:var(--gold); letter-spacing:.08em;
  }
  /* 専門画面の本体＝1枚の大カードで全画面 */
  .pane{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; }
  .pane.card{ padding:var(--pad); overflow:auto; }

  /* 🏆 順位の専門画面＝フル順位表 */
  .ranktable{ list-style:none; display:flex; flex-direction:column; gap:7px; }
  .ranktable li{
    display:flex; align-items:center; gap:10px;
    font-size:14px; color:var(--ink-soft);
    background:rgba(255,250,238,.02);
    border:1px solid rgba(58,52,42,.6);
    border-radius:var(--r-md);
    padding:10px 12px;
  }
  .ranktable .pos{
    font-feature-settings:"tnum"; color:var(--ink-faint);
    min-width:26px; text-align:center; font-size:15px;
  }
  .ranktable .who{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ranktable .cnt{ color:var(--ink-faint); font-size:13px; font-feature-settings:"tnum"; }
  .ranktable .cnt b{ color:var(--ink-soft); font-weight:600; font-size:16px; margin-right:2px; }
  .ranktable li.me{
    background:linear-gradient(180deg, rgba(217,138,91,.16), rgba(217,138,91,.04));
    border-color:rgba(217,138,91,.5);
    color:var(--vermilion-soft);
  }
  .ranktable li.me .pos, .ranktable li.me .cnt, .ranktable li.me .cnt b{ color:var(--vermilion-soft); }

  /* 🎯 目標の専門画面＝3段すべて（大きめに） */
  .goalfull{ display:flex; flex-direction:column; gap:12px; }
  .goalfull .step{ padding:11px 13px; }
  .goalfull .step .when{ width:64px; font-size:13.5px; }
  .goalfull .step .num{ font-size:13.5px; margin-bottom:5px; }
  .goalfull .lead{ font-size:var(--fs-small); color:var(--ink-faint); margin-bottom:4px; }

  /* 🗺️ 地図の専門画面＝全画面の大きい地図 */
  .mapfull{ flex:1 1 auto; min-height:0; }

  /* ── 地図の専門画面の道具（ピンを付ける／状態の注記） ── */
  /* 全画面地図は flex で縦に積む：上=道具帯／真ん中=地図（伸びる）／下=注記 */
  #map .pane.card{ padding:0; overflow:hidden; }
  #map .maptools{
    flex:0 0 auto;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:10px 11px;
    border-bottom:1px solid var(--card-edge);
  }
  #map .gmapfull{ flex:1 1 auto; min-height:0; position:relative; }
  #map .gmapfull .gmap{ position:absolute; inset:0; }
  /* 「📍 ここにピン」＝主役の朱ボタン */
  .map-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:linear-gradient(180deg, var(--vermilion), var(--vermilion-soft));
    border:1px solid rgba(217,138,91,.6); border-radius:var(--r-md);
    color:#231d15; font-weight:700; font-size:14px;
    font-family:"Zen Kurenaido",sans-serif;
    padding:9px 14px; cursor:pointer; transition:transform .12s ease;
  }
  .map-btn:active{ transform:scale(.96); }
  /* 地図に浮かせる丸ボタン（現在地に戻る／ストリートビュー）＝右下に縦並び */
  #map .map-fabs{
    position:absolute; right:12px; bottom:14px; z-index:5;
    display:flex; flex-direction:column; gap:9px;
  }
  #map .map-fab{
    width:44px; height:44px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:19px;
    background:linear-gradient(180deg, var(--card), var(--paper2));
    border:1px solid var(--card-edge); color:var(--ink);
    box-shadow:0 4px 12px -4px rgba(0,0,0,.7); transition:transform .12s ease;
  }
  #map .map-fab:active{ transform:scale(.93); }
  .map-tip{ font-size:11px; color:var(--ink-faint); flex:1; min-width:120px; line-height:1.35; }
  /* 下の注記＝「これは仮のマーク一覧」 */
  #map .map-note{
    flex:0 0 auto; padding:7px 11px calc(7px + env(safe-area-inset-bottom));
    font-size:10.5px; color:var(--ink-faint); border-top:1px solid var(--card-edge);
    background:rgba(0,0,0,.12);
  }

  /* ── マークを選ぶチップ／編集パネル（ポップアップ内の中身） ── */
  .markform{ font-size:12.5px; min-width:0; width:100%; }
  .markform .ttl{ font-weight:700; color:var(--gold); margin-bottom:3px; }
  .markform .meta{ font-size:11px; color:var(--ink-faint); margin-bottom:7px; }
  .markform .chips{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
  .markform .chip{
    font-size:12.5px; padding:5px 9px; border-radius:8px; cursor:pointer;
    border:1.5px solid var(--card-edge); background:rgba(255,250,238,.03); color:var(--ink-soft);
  }
  .markform .chip.on{
    border-color:var(--vermilion); background:rgba(217,138,91,.18); color:var(--vermilion-soft); font-weight:700;
  }
  /* ── 状態／メーカー／エコキュートのピッカー（markform・homepick 共通） ── */
  .pgroup{ margin-bottom:8px; }
  .pgroup > .glabel{ font-size:11px; color:var(--ink-faint); margin:2px 0 4px; font-weight:600; }
  /* メーカー(16)・エコ＝横スクロール帯。状態(9)は折返し。 */
  .pchips{ display:flex; gap:6px; flex-wrap:wrap; }
  .pchips.scroll{ flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:3px; }
  .pchips .chip{
    display:inline-flex; align-items:center; gap:5px; flex:0 0 auto;
    font-size:12px; padding:5px 8px; border-radius:8px; cursor:pointer;
    border:1.5px solid var(--card-edge); background:rgba(255,250,238,.03); color:var(--ink-soft);
    white-space:nowrap;
  }
  .pchips .chip.on{ border-color:var(--vermilion); background:rgba(217,138,91,.18); color:var(--vermilion-soft); font-weight:700; }
  /* 状態チップ＝色の丸の印 */
  .pchips .cdot{ width:13px; height:13px; border-radius:50%; flex:0 0 auto; border:1px solid rgba(255,255,255,.35); }
  /* メーカー／エコのletterバッジ（丸・グレー地に白文字）＝印 */
  .pchips .cbadge{
    min-width:18px; height:18px; padding:0 3px; border-radius:50%; flex:0 0 auto;
    display:inline-flex; align-items:center; justify-content:center;
    background:#5a554c; color:#fff; font-weight:800; font-size:9.5px; line-height:1;
    border:1px solid rgba(255,255,255,.3);
  }
  /* 「無し」チップの印（点線丸） */
  .pchips .cnone{ width:13px; height:13px; border-radius:50%; flex:0 0 auto;
    border:1.5px dashed rgba(255,255,255,.4); }
  .markform textarea{
    width:100%; min-width:0; box-sizing:border-box; background:rgba(255,250,238,.04); color:var(--ink);
    border:1px solid var(--card-edge); border-radius:8px; padding:7px 9px;
    font-family:inherit; font-size:12.5px; resize:vertical;
  }
  .markform .row{ display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .markform .row .mini{
    flex:1; min-width:90px; text-align:center; padding:7px 6px; border-radius:8px; cursor:pointer;
    border:1.5px solid var(--card-edge); background:rgba(255,250,238,.03); color:var(--ink-soft);
    font-size:12px; font-family:inherit;
  }
  .markform .mini.primary{ border-color:var(--vermilion); background:rgba(217,138,91,.18); color:var(--vermilion-soft); font-weight:700; }
  .markform .mini.retake{ border-color:rgba(143,174,125,.55); color:var(--leaf); }
  .markform .mini.danger{ border-color:rgba(217,138,91,.5); color:#e6a09a; }
  /* 🧭 ここへ行く（ルート＝スマホの地図アプリで開く）＝控えめな緑 */
  .markform .mini.go{ border-color:rgba(143,174,125,.55); color:var(--leaf); text-decoration:none; }
  .markform .mini.pano{ border-color:rgba(143,174,125,.4); color:var(--ink-soft); text-decoration:none; }
  .markform .gonote{ font-size:10px; color:var(--ink-faint); margin-top:5px; opacity:.85; }

  /* ── 🗺️ 地図 / 📋 リスト 切替（#map上部の道具帯に置く小さなトグル） ── */
  .seg{
    display:inline-flex; border:1px solid var(--card-edge); border-radius:var(--r-sm);
    overflow:hidden; background:rgba(255,250,238,.02);
  }
  .seg button{
    background:transparent; border:none; cursor:pointer;
    color:var(--ink-soft); font-size:12.5px; font-family:"Zen Kurenaido",sans-serif;
    padding:7px 11px; letter-spacing:.02em;
  }
  .seg button + button{ border-left:1px solid var(--card-edge); }
  .seg button.on{
    background:linear-gradient(180deg, rgba(217,138,91,.18), rgba(217,138,91,.05));
    color:var(--vermilion-soft); font-weight:700;
  }
  /* 📋 自分のピンのリスト（新しい順・地図⇄切替の片方） */
  #map .gmaplistfull{ flex:1 1 auto; min-height:0; overflow:auto; padding:10px 11px; display:none; }
  #map.listmode .gmapfull{ display:none; }
  #map.listmode .gmaplistfull{ display:block; }
  .pinrow{
    display:flex; align-items:flex-start; gap:9px;
    background:rgba(255,250,238,.02); border:1px solid rgba(58,52,42,.6);
    border-radius:var(--r-md); padding:9px 11px; margin-bottom:8px;
  }
  .pinrow .ic{ display:inline-flex; align-items:center; gap:4px; flex:0 0 auto; padding-top:2px; }
  .pinrow .ic .cdot{ width:15px; height:15px; border-radius:50%; border:1px solid rgba(255,255,255,.35); }
  .pinrow .ic .cnone{ width:15px; height:15px; border-radius:50%; border:1.5px dashed rgba(255,255,255,.4); }
  .pinrow .ic .cbadge{ min-width:18px; height:18px; padding:0 3px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    background:#5a554c; color:#fff; font-weight:800; font-size:9.5px; line-height:1;
    border:1px solid rgba(255,255,255,.3); }
  .pinrow .body{ flex:1; min-width:0; }
  .pinrow .lbl{ font-size:12.5px; color:var(--ink); font-weight:600; }
  .pinrow .cm{ font-size:12px; color:var(--ink-soft); margin-top:2px; word-break:break-word; }
  .pinrow .cm.empty{ color:var(--ink-faint); font-style:italic; }
  .pinrow .sub{ font-size:10.5px; color:var(--ink-faint); margin-top:3px; font-feature-settings:"tnum"; }
  .pinrow .acts{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .pinrow .acts a, .pinrow .acts button{
    display:inline-flex; align-items:center; gap:4px; cursor:pointer; text-decoration:none;
    border:1.5px solid var(--card-edge); background:rgba(255,250,238,.03); color:var(--ink-soft);
    border-radius:8px; padding:6px 9px; font-size:11.5px; font-family:inherit;
  }
  .pinrow .acts .go{ border-color:rgba(143,174,125,.55); color:var(--leaf); }
  .pinrow .acts .pano{ border-color:rgba(143,174,125,.4); color:var(--ink-soft); }
  .pinrow .acts .edit{ border-color:rgba(217,138,91,.5); color:var(--vermilion-soft); }
  .listempty{ text-align:center; color:var(--ink-faint); font-size:12.5px; padding:24px 8px; line-height:1.7; }

  /* ── ホームから1軒記録：現在地にピン→マークを選ぶチップ（#mapに入らず） ── */
  /* 画面下から立つ小さなシート。型(色/角丸/余白)はそのまま流用 */
  .homepick{
    position:fixed; left:0; right:0; bottom:0; z-index:1200;
    max-width:480px; margin:0 auto;
    background:linear-gradient(180deg, var(--card), var(--paper2));
    border:1px solid var(--card-edge); border-bottom:none;
    border-radius:var(--r-lg) var(--r-lg) 0 0;
    box-shadow:0 -16px 40px -18px rgba(0,0,0,.85);
    padding:13px 14px calc(13px + env(safe-area-inset-bottom));
    transform:translateY(110%); transition:transform .26s ease;
  }
  .homepick.show{ transform:translateY(0); }
  .homepick .ttl{ font-family:"Yuji Syuku",serif; font-size:14px; color:var(--gold); margin-bottom:3px; }
  .homepick .meta{ font-size:11px; color:var(--ink-faint); margin-bottom:9px; }
  .homepick .chips{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:4px; }
  .homepick .chip{
    font-size:13.5px; padding:9px 12px; border-radius:9px; cursor:pointer;
    border:1.5px solid var(--card-edge); background:rgba(255,250,238,.03); color:var(--ink-soft);
  }
  .homepick .chip.on{ border-color:var(--vermilion); background:rgba(217,138,91,.18); color:var(--vermilion-soft); font-weight:700; }
  .homepick textarea{
    width:100%; margin-top:9px; background:rgba(255,250,238,.04); color:var(--ink);
    border:1px solid var(--card-edge); border-radius:9px; padding:8px 10px;
    font-family:inherit; font-size:13px; resize:vertical;
  }
  .homepick .row{ display:flex; gap:8px; margin-top:10px; }
  .homepick .row .mini{
    flex:1; text-align:center; padding:10px 8px; border-radius:9px; cursor:pointer;
    border:1.5px solid var(--card-edge); background:rgba(255,250,238,.03); color:var(--ink-soft);
    font-size:13.5px; font-family:inherit;
  }
  .homepick .row .mini.primary{ border-color:var(--vermilion); background:rgba(217,138,91,.18); color:var(--vermilion-soft); font-weight:700; }
  /* 半透明の覆い（外をタップで閉じる） */
  .homepick-veil{
    position:fixed; inset:0; z-index:1190; background:rgba(0,0,0,.4);
    opacity:0; visibility:hidden; transition:opacity .26s ease, visibility .26s;
  }
  .homepick-veil.show{ opacity:1; visibility:visible; }

  /* ── ③ 「🏷️ 種類」ボタン（道具帯・墨地に金の控えめ） ── */
  .kinds-btn{
    display:inline-flex; align-items:center; gap:5px;
    background:linear-gradient(180deg, rgba(255,250,238,.05), rgba(0,0,0,.05));
    border:1px solid var(--card-edge); border-radius:var(--r-md);
    color:var(--gold); font-size:13px; font-family:"Zen Kurenaido",sans-serif;
    padding:9px 12px; cursor:pointer; transition:transform .12s ease;
  }
  .kinds-btn:active{ transform:scale(.96); }

  /* ── ③ ピンの種類を編集するオーバーレイ（下から立つシート・型はhomepick流用） ── */
  .kinds-veil{
    position:fixed; inset:0; z-index:1290; background:rgba(0,0,0,.45);
    opacity:0; visibility:hidden; transition:opacity .26s ease, visibility .26s;
  }
  .kinds-veil.show{ opacity:1; visibility:visible; }
  .kinds{
    position:fixed; left:0; right:0; bottom:0; z-index:1300;
    max-width:480px; margin:0 auto; max-height:82dvh; max-height:82svh;
    display:flex; flex-direction:column;
    background:linear-gradient(180deg, var(--card), var(--paper2));
    border:1px solid var(--card-edge); border-bottom:none;
    border-radius:var(--r-lg) var(--r-lg) 0 0;
    box-shadow:0 -16px 40px -18px rgba(0,0,0,.85);
    padding:13px 14px calc(13px + env(safe-area-inset-bottom));
    transform:translateY(110%); transition:transform .26s ease;
  }
  .kinds.show{ transform:translateY(0); }
  .kinds-head{ display:flex; align-items:center; justify-content:space-between; }
  .kinds-head .ttl{ font-family:"Yuji Syuku",serif; font-size:15px; color:var(--gold); }
  .kinds-x{
    background:transparent; border:none; cursor:pointer; color:var(--ink-soft);
    font-size:16px; padding:4px 6px; line-height:1;
  }
  .kinds-meta{ font-size:11px; color:var(--ink-faint); margin:3px 0 9px; line-height:1.4; }
  .kinds-list{ flex:1 1 auto; min-height:0; overflow:auto; display:flex; flex-direction:column; gap:8px; }
  /* 1行＝アイコン＋名前＋色チップ＋（編集/削除） */
  .kindrow{
    display:flex; align-items:center; gap:9px;
    background:rgba(255,250,238,.02); border:1px solid rgba(58,52,42,.6);
    border-radius:var(--r-md); padding:8px 10px;
  }
  .kindrow .ic{ flex:0 0 auto; width:26px; display:inline-flex; align-items:center; justify-content:center; }
  .kindrow .ic .cbadge{ min-width:22px; height:22px; padding:0 4px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    background:#5a554c; color:#fff; font-weight:800; font-size:11px; line-height:1;
    border:1px solid rgba(255,255,255,.3); }
  .kindrow .nm{ flex:1; min-width:0; font-size:13.5px; color:var(--ink);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .kindrow .sw{ flex:0 0 auto; width:16px; height:16px; border-radius:50%;
    border:1px solid rgba(255,255,255,.25); }
  .kindrow .acts{ display:flex; gap:6px; flex:0 0 auto; }
  .kindrow .acts button{
    border:1.5px solid var(--card-edge); background:rgba(255,250,238,.03); color:var(--ink-soft);
    border-radius:8px; padding:6px 9px; font-size:11.5px; font-family:inherit; cursor:pointer;
  }
  .kindrow .acts .edit{ border-color:rgba(217,138,91,.5); color:var(--vermilion-soft); }
  .kindrow .acts .del{ border-color:rgba(217,138,91,.5); color:#e6a09a; }
  .kinds-add{
    flex:0 0 auto; margin-top:10px; width:100%;
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:linear-gradient(180deg, var(--vermilion), var(--vermilion-soft));
    border:1px solid rgba(217,138,91,.6); border-radius:var(--r-md);
    color:#231d15; font-weight:700; font-size:14px; font-family:"Zen Kurenaido",sans-serif;
    padding:11px 14px; cursor:pointer;
  }
  .kinds-add:active{ transform:scale(.985); }
  /* 種類の追加/編集フォーム（行を開いて入力） */
  .kindedit{
    background:rgba(255,250,238,.03); border:1px solid var(--card-edge);
    border-radius:var(--r-md); padding:10px 11px; display:flex; flex-direction:column; gap:8px;
  }
  .kindedit .frow{ display:flex; align-items:center; gap:8px; }
  .kindedit label{ font-size:11px; color:var(--ink-faint); flex:0 0 auto; width:40px; }
  .kindedit input[type=text]{
    flex:1; min-width:0; background:rgba(255,250,238,.05); color:var(--ink);

    border-radius:8px; background:transparent; cursor:pointer;
  }
  .kindedit .frow.btns{ gap:8px; margin-top:2px; }
  .kindedit .frow.btns button{
    flex:1; border:1.5px solid var(--card-edge); background:rgba(255,250,238,.03); color:var(--ink-soft);
    border-radius:8px; padding:9px 8px; font-size:13px; font-family:inherit; cursor:pointer;
  }
  .kindedit .frow.btns .save{ border-color:var(--vermilion); background:rgba(217,138,91,.18); color:var(--vermilion-soft); font-weight:700; }
</style>

<body>

<div class="app screen show" id="home">

  <!-- ====== 3ゾーン本体 ====== -->

<div class="screen" id="rank">

<!-- 本物の地図＝Google Maps JavaScript API（高解像度の航空写真）。鍵はこの1本のみ（後でサイト限定に制限） -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKNs7uzY9RsM2qZXdBlL6cekzQauM3PL4&v=weekly&loading=async&callback=__initGmaps"></script>
<script>
/* =========================================================================
   この画面はモック（サンプル数値）。本物のGPS・実データは入れない＝¥0・単一HTML。
   役割：手描きレイアウト（左帯ランキング／右上 目標／右下 地図）を
        "実際のスマホ画面"として正確に再現できたかの証明＋型の見本。
   数字は本番では地図のピン（タップ記録）から自動集計される想定。
   ========================================================================= */

// サンプルデータ（「一筆」画面と同じあだ名・例の数字に揃える）
var data = {
  nick:  "ハヤテ",
  // きょう"話した数"（初期値。実際は recomputeTalked() が今日のピンから自動計算して上書き）
  talkedNow: 0,
  // きょうの目標＝時間チェックポイント3段（〜13時/〜17時/〜19時の話した数）
  // hourEnd＝その段が締まる時刻（時）。現在時刻の出し分けに使う。
  timeGoals: [
    { until:"〜13時", target:3,  hourEnd:13 },
    { until:"〜17時", target:7,  hourEnd:17 },
    { until:"〜19時", target:10, hourEnd:19 }
  ],
  // 順位＝今月のアポ件数（多い順・アポだけ）。中身は recomputeRank() が
  // 背骨v3 と同じ形のデータから毎回 自動計算して入れる（初期は空＝固定の見本は廃止）。
  ranking: []
};

// --- 今が何時か＝現在の時間帯（段）を決める ---
// 〜13時より前=0段／13:00〜17:00=1段／17:00〜19:00=2段／19:00以降=2段(終い)。
function currentBandIndex(goals){
  var h = new Date().getHours();
  for (var i = 0; i < goals.length; i++){
    if (h < goals[i].hourEnd) return i;   // この段がまだ進行中
  }
  return goals.length - 1;                // 19時以降＝最後の段（おつかれさま）
}

// --- 1段ぶんのHTML（目標と進捗＝話した数 5/7・あと2 ＋バー） ---
function stepHtml(goal, now, isLive){
  var target = goal.target;
  var done = now >= target;
  var pct  = target > 0 ? Math.min(100, Math.round(now / target * 100)) : 0;
  var left = Math.max(0, target - now);
  var cls  = "step" + (isLive ? " live" : "") + (done ? " done" : "");
  var numHtml = done
    ? '<b>' + now + '/' + target + '</b>・達成'
    : now + '/' + '<b>' + target + '</b>・あと ' + left;
  return '<div class="' + cls + '">'
       +   '<span class="when">' + goal.until + '</span>'
       +   '<span class="mid">'
       +     '<span class="num">' + numHtml + '</span>'
       +     '<span class="bar"><i style="width:' + pct + '%"></i></span>'
       +   '</span>'
       + '</div>';
}

// --- ① ホームの目標＝「今の時間帯のぶんだけ」を“達成の数字を主役級に大きく”表示
//        特大「5/10」＋添えの「あと5」＋時間帯ラベルは小さく＋細い進捗バー。
//        （19時以降は静かに締める＝同じ大数字の型で「話した数」を主役に） ---
function renderGoalHome(d){
  var now = d.talkedNow;
  var goals = d.timeGoals;
  var band = currentBandIndex(goals);
  var h = new Date().getHours();
  var box = document.getElementById("gStepNow");

  if (h >= goals[goals.length - 1].hourEnd){
    // 19時以降＝静かに締める（達成扱いの色で大きく）
    box.innerHTML = ''
      + '<div class="bignow done">'
      +   '<span class="when">きょう</span>'
      +   '<span class="figs">'
      +     '<span class="big">' + now + '</span>'
      +     '<span class="left">話した数 ・ おつかれさま</span>'
      +   '</span>'
      + '</div>';
    return;
  }
  // 今の段＝特大の達成数字「now/target」＋あとnこ＋細バー
  var g = goals[band];
  var target = g.target;
  var done = now >= target;
  var pct  = target > 0 ? Math.min(100, Math.round(now / target * 100)) : 0;
  var left = Math.max(0, target - now);
  var leftHtml = done ? '達成' : 'あと <b>' + left + '</b>';
  box.innerHTML = ''
    + '<div class="bignow' + (done ? ' done' : '') + '">'
    +   '<span class="when">' + g.until + '</span>'
    +   '<span class="figs">'
    +     '<span class="big">' + now + '<span class="of">/' + target + '</span></span>'
    +     '<span class="left">' + leftHtml + '</span>'
    +   '</span>'
    + '</div>'
    + '<span class="bar"><i style="width:' + pct + '%"></i></span>';
}

// --- 目標の専門画面＝3段すべて。今いる段を強調 ---
function renderGoalAll(d){
  var now = d.talkedNow;
  var goals = d.timeGoals;
  var band = currentBandIndex(goals);
  var html = "";
  for (var i = 0; i < goals.length; i++){
    html += stepHtml(goals[i], now, i === band);
  }
  document.getElementById("gStepsAll").innerHTML = html;
}

// --- 「話した数」をピンから自動計算＝今日(createdが今日)で、状態がセット済みかつ
//     その状態の count!==false の件数。data.talkedNow に入れて目標表示へ反映する。 ---
function isToday(iso){
  if(!iso) return false;
  var t = new Date(iso), n = new Date();
  return t.getFullYear()===n.getFullYear() && t.getMonth()===n.getMonth() && t.getDate()===n.getDate();
}
function recomputeTalked(){
  var c = 0;
  pins.forEach(function(p){
    if(!isToday(p.created)) return;
    if(!p.status) return;                 // 新規ピン（未対応）は数えない
    var st = statusOf(p.status);
    if(st && st.count!==false) c++;       // count:false（古い等）は行動に数えない
  });
  data.talkedNow = c;
  renderGoalHome(data);                   // 目標表示（ホーム＝特大数字）を更新
  renderGoalAll(data);                    // 目標の専門画面（3段）も同じ数で更新
  recomputeRank();                        // 順位も同じピンから生きた値に＝地図と連動（背骨v3の形）
}

// --- 順位データを多い順に並べた配列を返す ---
function sortedRanking(d){
  return d.ranking.slice().sort(function(a,b){ return b.cnt - a.cnt; });
}

/* ===== 🦴 背骨v3 連動レイヤ（1段目：¥0モック。2段目で“窓口”の中身を本物DBへ差し替え）=====
   順位の元データの形＝背骨v3 activity_log と同じ列に揃える：
     acted_by_actor_id（誰）/ display_name（表示名）/ activity_type（'visit'）/
     result（結果＝status：apo=アポ取得）/ occurred_at（現場時刻）/ geo_lat,geo_lng / voided_at（取消）
   自分の活動＝地図のピンから生成（本番では端末→背骨v3へ送られる1行に相当）。 */
var SELF_ACTOR_ID = "self";                    // 本番では actor.id
function activityFromPins(){
  var recs = [];
  pins.forEach(function(p){
    if(!p || !p.status) return;
    recs.push({
      acted_by_actor_id: SELF_ACTOR_ID,
      display_name: data.nick,
      activity_type: "visit",
      result: p.status,                        // 'apo' が背骨v3の「アポ取得」に対応
      occurred_at: p.created,                  // 背骨v3 occurred_at（現場時刻）
      geo_lat: p.lat, geo_lng: p.lng,          // 背骨v3 geo列
      voided_at: null
    });
  });
  return recs;
}
// 今月か（occurred_at が今月）
function isThisMonth(iso){
  if(!iso) return false;
  var t = new Date(iso), n = new Date();
  return t.getFullYear()===n.getFullYear() && t.getMonth()===n.getMonth();
}
/* 🪟 集計の窓口＝「今月・アポだけ・担当者ごとに件数・多い順」。
   背骨v3：SELECT acted_by_actor_id, COUNT(*) FROM activity_log
     WHERE result='アポ' AND occurred_at 当月 AND voided_at IS NULL
     GROUP BY acted_by_actor_id ORDER BY COUNT DESC
   ★2段目：この関数の中身だけを本物DB（集計ビュー/API）に差し替える。 */
function rankApoThisMonth(records){
  var byActor = {};
  records.forEach(function(r){
    if(!r || r.voided_at) return;
    if(r.activity_type !== "visit") return;
    if(r.result !== "apo") return;             // Q1＝アポだけ（確定）
    if(!isThisMonth(r.occurred_at)) return;     // 今月のみ
    var id = r.acted_by_actor_id;
    if(!byActor[id]) byActor[id] = { who:r.display_name, cnt:0 };
    byActor[id].cnt++;
  });
  var arr = Object.keys(byActor).map(function(k){ return byActor[k]; });
  arr.sort(function(a,b){ return b.cnt - a.cnt; });
  return arr;
}
/* 他の人＝本番の共有DBが立つまでの“見本”（2段目で本物に置換）。自分は含めない。 */
var RANK_SEED_OTHERS = [
  { who:"ケン", cnt:9 }, { who:"リク", cnt:8 }, { who:"ノア", cnt:7 },
  { who:"アヤ", cnt:5 }, { who:"カイ", cnt:5 }, { who:"ミオ", cnt:4 },
  { who:"ジン", cnt:3 }, { who:"ソウ", cnt:2 }, { who:"ユウ", cnt:1 }
];
// 自分の今月アポ件数＝窓口で集計（地図のピンから・生きてる）
function myApoCountThisMonth(){
  var mine = rankApoThisMonth(activityFromPins());
  return mine.length ? mine[0].cnt : 0;
}
// 全員の順位＝見本(他人)＋自分(生きてる)を合体し、多い順に
function liveRanking(){
  var list = RANK_SEED_OTHERS.map(function(o){ return { who:o.who, cnt:o.cnt, me:false }; });
  list.push({ who:data.nick, cnt:myApoCountThisMonth(), me:true });
  list.sort(function(a,b){ return b.cnt - a.cnt; });
  return list;
}
// 順位を生きた値で更新＝地図のピンが変わるたびに呼ばれる（recomputeTalked内）
function recomputeRank(){
  data.ranking = liveRanking();
  renderRankHome(data);
  renderRankFull(data);
}

// --- ホームの左帯：今月のアポ順位（小さく・自分は朱で強調） ---
function renderRankHome(d){
  var list = sortedRanking(d);
  var html = "";
  for (var i = 0; i < list.length; i++){
    var r = list[i];
    html += '<li class="' + (r.me ? "me" : "") + '">'
          + '<span class="pos">' + (i + 1) + '</span>'
          + '<span class="who">' + r.who + '</span>'
          + '<span class="cnt">' + r.cnt + '</span>'
          + '</li>';
  }
  document.getElementById("rankList").innerHTML = html;
}

// --- 順位の専門画面：フル順位表（全員・件数・自分強調） ---
function renderRankFull(d){
  var list = sortedRanking(d);
  var html = "";
  for (var i = 0; i < list.length; i++){
    var r = list[i];
    html += '<li class="' + (r.me ? "me" : "") + '">'
          + '<span class="pos">' + (i + 1) + '</span>'
          + '<span class="who">' + r.who + (r.me ? '（あなた）' : '') + '</span>'
          + '<span class="cnt"><b>' + r.cnt + '</b>件</span>'
          + '</li>';
  }
  document.getElementById("rankFull").innerHTML = html;
}

// --- ③ ホームから1軒記録：#mapに入らず現在地にピン→状態を選ぶ（2タップ） ---
// 保存先・関数は #map と同じ（apo.pins.v1 / savePins / renderPins を流用＝二重実装しない）。
// 「状態」を選ぶ＝記録（色＝状態）。メーカー/エコは状態の前後どちらで選んでも反映する。
var homePickState = { status:"", maker:"", eco:"", lat:null, lng:null, acc:null, sample:false, pending:false };
// ホームの選択チップの結線（種類の追加/編集で貼り直す時も使う）。
// status＝選んだ瞬間に記録（GPS未着なら覚えて位置が来たら自動確定）。maker/eco＝状態に控えるだけ。
function wireHomePickChips(){
  wireChips(document.getElementById("homePickChips"), homePickState);
  // 「状態」チップだけは選択＝記録のトリガにする（上書きで再結線）
  document.getElementById("homePickChips").querySelectorAll('.chip[data-group="status"]').forEach(function(b){
    b.addEventListener("click", function(){
      // wireChips が既に homePickState.status を更新済み。ここで記録へ進める。
      if(homePickState._pin){                  // 記録済みなら状態だけ差し替えて保存
        homePickState._pin.status = homePickState.status;
        homePickState._pin.updated = new Date().toISOString();
        savePins(); renderPins(); recomputeTalked();
        return;
      }
      if(homePickState.lat!=null){
        confirmHomePin();                       // 位置が既に確定済み＝即記録
      } else {
        homePickState.pending = true;           // まだGPS待ち＝来たら自動で記録（取りこぼさない）
        var st = statusOf(homePickState.status);
        document.getElementById("homePickMeta").textContent =
          "現在地を確認中…（"+(st?st.name:"")+"）届き次第この状態で記録します";
      }
    });
  });
  // 記録済みのあとに「メーカー/エコ」を選んだら、そのピンへ後追いで反映して保存する
  document.getElementById("homePickChips").querySelectorAll('.chip[data-group="maker"],.chip[data-group="eco"]').forEach(function(b){
    b.addEventListener("click", function(){
      if(homePickState._pin){
        homePickState._pin.maker = homePickState.maker;
        homePickState._pin.eco   = homePickState.eco;
        homePickState._pin.updated = new Date().toISOString();
        savePins(); renderPins(); recomputeTalked();
      }
    });
  });
}
function openHomePick(){
  homePickState = { status:"", maker:"", eco:"", lat:null, lng:null, acc:null, sample:false, pending:false };
  var sheet = document.getElementById("homePick");
  var veil  = document.getElementById("homePickVeil");
  var meta  = document.getElementById("homePickMeta");
  var memo  = document.getElementById("homePickMemo");
  // チップ＝#mapと同じ状態/メーカー/エコの3グループ
  document.getElementById("homePickChips").innerHTML = pickerGroupsHtml(homePickState);
  memo.value = ""; memo.style.display = "none";
  meta.textContent = "現在地を確認中…";
  veil.classList.add("show"); sheet.classList.add("show");
  wireHomePickChips();
  // 現在地を取る（#mapと同じ getHere・記録時のGPS）
  getHere(function(h){
    homePickState.lat=h.lat; homePickState.lng=h.lng; homePickState.acc=h.acc; homePickState.sample=h.sample;
    hereLatLng=[h.lat,h.lng]; hereAcc=h.acc; drawHere();
    // GPS待ちの間に状態を押していたら、ここで取りこぼさず確定（実機のGPS遅延対策）
    if(homePickState.pending && homePickState.status){
      homePickState.pending = false;
      confirmHomePin();
      return;
    }
    meta.textContent = (h.sample ? "サンプル位置（本番はHTTPSで実測）" : "現在地")
      + " "+h.lat.toFixed(5)+", "+h.lng.toFixed(5)
      + (h.acc!=null?"（精度 約"+h.acc+"m）":"") + " ・ 状態を1つ選ぶ＝記録";
  });
}
// 状態を選んだ＝現在地にピンを確定（その後メモ任意）。#mapと同じ保存（savePins/renderPins）
function confirmHomePin(){
  var s = homePickState;
  if(s.lat==null || !s.status) return;
  var iso = new Date().toISOString();
  var p = { lat:s.lat, lng:s.lng, acc:s.acc, status:s.status, maker:s.maker, eco:s.eco,
            comment:"", created:iso, updated:iso };

// GPSが取れない時のフォールバック（東京近郊住宅地・管理マップと同じあたり）
var SAMPLE_CENTER = [35.7010, 139.5500];
var usingSample = false;   // true＝サンプル位置（本番HTTPSで実測）

// 現在地（取れたら保持）。取れなければサンプル中心。
var hereLatLng = null, hereAcc = null;

// ── 現在地を取る（成功で {lat,lng,acc}／失敗でサンプルにフォールバック） ──
function getHere(cb){
  if(!navigator.geolocation){
    usingSample = true;
    cb({lat:SAMPLE_CENTER[0], lng:SAMPLE_CENTER[1], acc:40, sample:true});
    return;
  }
  navigator.geolocation.getCurrentPosition(function(pos){
    usingSample = false;
    cb({ lat:pos.coords.latitude, lng:pos.coords.longitude,
         acc:Math.round(pos.coords.accuracy||30), sample:false });
  }, function(){
    // 許可拒否・file:// 等 → サンプル位置にフォールバック（少しずらして毎回同じ点に積まない）
    usingSample = true;
    var jitter = (Math.random()-0.5)*0.0014;
    cb({lat:SAMPLE_CENTER[0]+jitter, lng:SAMPLE_CENTER[1]+jitter, acc:40, sample:true});
  }, {enableHighAccuracy:true, timeout:8000, maximumAge:5000});
}

/* ── 現在地の“表示だけ”リアルタイム追従（watchPosition）──────────────
   ・地図上の自分の点が動くたび追従＝Googleマップの青い点のように。
   ・⚠️ 記録（ピンの保存）は従来どおりタップ/ピンを置いた時のGPSだけ。
     watchは“表示”のみ＝常時追跡・常時保存はしない（プライバシー/最小収集）。
   ・画面が隠れたら止め、戻ったら再開（電池配慮）。使えない/拒否時はサンプルで静止。 */
var watchId = null;
function startWatch(){
  if(watchId!=null) return;                 // 二重起動しない
  if(!navigator.geolocation) return;        // 使えない＝既存の静止フォールバックのまま
  if(document.visibilityState === "hidden") return;
  watchId = navigator.geolocation.watchPosition(function(pos){
    usingSample = false;
    hereLatLng = [pos.coords.latitude, pos.coords.longitude];
    hereAcc = Math.round(pos.coords.accuracy||30);
    drawHere();                             // 表示だけ更新（保存はしない）
  }, function(){
    // 拒否/失敗＝watchを畳む（既存のサンプル静止表示のまま＝騒がない）
    stopWatch();
  }, {enableHighAccuracy:true, maximumAge:3000, timeout:12000});
}
function stopWatch(){
  if(watchId!=null && navigator.geolocation){ navigator.geolocation.clearWatch(watchId); }
  watchId = null;
}
// 画面が隠れたら止め、戻ったら再開（電池配慮）
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "hidden") stopWatch();
  else startWatch();
});

/* ── HTMLオーバーレイ（任意のlatlngに自由なHTML要素を浮かべる）──
   絵文字ピン・コメントラベル・現在地の脈打つ点を、CSSの型(.pinmark/.pin-label/.here-dot)
   のまま航空写真の上に置くための薄いラッパ（OverlayViewの最小実装）。 */
function makeHtmlOverlay(){
  function HtmlOverlay(latlng, el, onClick){
    this.latlng = latlng; this.el = el; this.onClick = onClick;
  }
  HtmlOverlay.prototype = new google.maps.OverlayView();
  HtmlOverlay.prototype.onAdd = function(){
    var self = this;
    this.el.style.position = "absolute";
    this.el.style.cursor = this.onClick ? "pointer" : "default";
    this.getPanes().overlayMouseTarget.appendChild(this.el);
    if(this.onClick){
      this._lis = google.maps.event.addDomListener(this.el, "click", function(e){
        e.stop && e.stop();
        if(e.stopPropagation) e.stopPropagation();
        self.onClick();
      });
    }
  };
  HtmlOverlay.prototype.draw = function(){
    var pos = this.getProjection().fromLatLngToDivPixel(this.latlng);
    if(!pos) return;
    this.el.style.left = pos.x + "px";
    this.el.style.top  = pos.y + "px";
  };
  HtmlOverlay.prototype.onRemove = function(){
    if(this._lis){ google.maps.event.removeListener(this._lis); this._lis=null; }
    if(this.el && this.el.parentNode){ this.el.parentNode.removeChild(this.el); }
  };
  return HtmlOverlay;
}
var HtmlOverlay = null;   // initHomeMap で google到着後に作る

function clearOverlays(arr){ arr.forEach(function(o){ if(o.setMap) o.setMap(null); }); arr.length = 0; }

// 現在地マーカー＋精度円を描く（両マップ）
function drawHere(){
  if(!hereLatLng) return;
  var ll = new google.maps.LatLng(hereLatLng[0], hereLatLng[1]);
  [{m:homeMap, arr:homeHereObjs}].forEach(function(o){
    if(!o.m) return;
    clearOverlays(o.arr);
    if(hereAcc!=null){
      o.arr.push(new google.maps.Circle({
        map:o.m, center:ll, radius:hereAcc,
        strokeColor:"#cbb27a", strokeOpacity:.8, strokeWeight:1.5,
        fillColor:"#cbb27a", fillOpacity:.10, clickable:false, zIndex:1 }));
    }
    var dot = document.createElement("div"); dot.className = "here-dot";
    var ov = new HtmlOverlay(ll, dot, null); ov.setMap(o.m);
    o.arr.push(ov);
  });
}

// 丸バッジDOMを作る（色＝status／文字＝makerのletter／status=""は中空＝未対応）
function badgeEl(p){
  var st  = statusOf(p.status);

  var letter = mkr ? mkr.letter : (st ? "" : "・");   // 新規ピンでmaker無し＝「・」

  var sizeCls = letter.length>=3 ? "s3" : (letter.length===2 ? "s2" : "s1");
  pin.className = "pin-badge " + sizeCls + (st ? "" : " is-new");
  if(st) pin.style.background = st.color;
  var span = document.createElement("span");
  span.className = "lt"; span.textContent = letter;
  pin.appendChild(span);
  return pin;
}
// 1本のピンを地図に描く（全画面＝編集できる／ホーム＝見るだけ）
function drawOnePin(p, map, arr, editable){

/* ── 選ぶUI（状態・メーカー・エコキュート）のチップ群を作る共通関数 ──
   group＝"status"/"maker"/"eco"。各チップに「印」（色丸 or letterバッジ）＋名前。 */
function pickerGroupsHtml(sel){

  var statusChips = STATUSES.map(function(s){

  }).join("");
  // メーカー（16・横スクロール）＝letterバッジ＋名前。1つだけ選択。
  var makerChips = MAKERS.map(function(m){
    return '<span class="chip'+(m.key===sel.maker?" on":"")+'" data-group="maker" data-key="'+esc(m.key)+'">'
      + '<span class="cbadge">'+esc(m.letter)+'</span>'+esc(m.name)+'</span>';
  }).join("");
  // エコキュート（任意・横スクロール）＝「無し」＋letter＋名前。
  var ecoNone = '<span class="chip'+(!sel.eco?" on":"")+'" data-group="eco" data-key="">'
      + '<span class="cnone"></span>無し</span>';
  var ecoChips = ecoNone + ECOS.map(function(m){
    return '<span class="chip'+(m.key===sel.eco?" on":"")+'" data-group="eco" data-key="'+esc(m.key)+'">'
      + '<span class="cbadge">'+esc(m.letter)+'</span>'+esc(m.name)+'</span>';

  return ''
    + '<div class="pgroup"><div class="glabel">状態（色）</div><div class="pchips">'+statusChips+'</div></div>'
    + '<div class="pgroup"><div class="glabel">メーカー（文字）</div><div class="pchips scroll">'+makerChips+'</div></div>'
    + '<div class="pgroup"><div class="glabel">エコキュート（任意）</div><div class="pchips scroll">'+ecoChips+'</div></div>';
}

// ── ピンを選ぶ（状態/メーカー/エコ）＋メモ（任意）のフォームHTML ──
function markFormHtml(opts){
  var sel = { status:opts.status||"", maker:opts.maker||"", eco:opts.eco||"" };
  var meta = "";
  if(opts.lat!=null){
    meta = "位置 "+opts.lat.toFixed(5)+", "+opts.lng.toFixed(5)
         + (opts.acc!=null?"（精度 約"+opts.acc+"m）":"")
         + (opts.time?" ・ "+opts.time:"")
         + (opts.sample?" ・ サンプル位置（本番はHTTPSで実測）":"");
  }
  // 🧭 ここへ行く＝ルート（ナビ・Google）／🧍 ストリートビュー＝アプリ内で開く（外部に飛ばさない）
  var goBtn = (opts.lat!=null)
    ? '<a class="mini go" href="'+gDirUrl(opts.lat,opts.lng)+'" target="_blank" rel="noopener">🧭 ここへ行く</a>'
      +'<span class="mini pano" data-act="pano">🧍 ストリートビュー</span>'
    : "";
  var rows = opts.isNew
    ? '<span class="mini primary" data-act="save">この内容で確定</span>'
      +'<span class="mini" data-act="cancel">やめる</span>'
    : '<span class="mini primary" data-act="save">保存</span>'
      + goBtn
      +'<span class="mini retake" data-act="retake">📍 ここで位置を取り直す</span>'
      +'<span class="mini danger" data-act="del">削除</span>';
  // メモは新規ピンなら今日の日付（例 6/19）を初期表示＝みんなのタップ数を減らす（編集時は既存メモのまま）
  var _t = new Date();
  var memoVal = opts.isNew ? (opts.comment || ((_t.getMonth()+1)+"/"+_t.getDate())) : (opts.comment||"");
  return '<div class="markform">'
    +   '<div class="ttl">'+(opts.isNew?"記録する（状態を選ぶ）":"このピンを直す")+'</div>'
    +   (meta?'<div class="meta">'+esc(meta)+'</div>':'')
    +   pickerGroupsHtml(sel)
    +   '<textarea rows="2" placeholder="メモ（任意・打たなくてもOK）">'+esc(memoVal)+'</textarea>'
    +   '<div class="row">'+rows+'</div>'
    +   (goBtn?'<div class="gonote">ナビ（ここへ行く）はGoogleマップで開きます。ストリートビューはこの画面で見られます。</div>':'')
    + '</div>';
}

// チップの選択結線（共通）。data-group（status/maker/eco）ごとに単一選択トグル。
// state は {status, maker, eco} を更新（eco は「無し」＝空で解除可）。
function wireChips(el, state){
  el.querySelectorAll(".pchips .chip").forEach(function(b){
    b.addEventListener("click", function(){
      var g = b.getAttribute("data-group");
      // 同じグループ内だけ選択を外す
      el.querySelectorAll('.pchips .chip[data-group="'+g+'"]').forEach(function(x){ x.classList.remove("on"); });
      b.classList.add("on");
      state[g] = b.getAttribute("data-key");
    });
  });
}

// ── InfoWindowを1つ開く共通（同時に1つだけ・domreadyで中身を結線） ──
// targetMap＝吹き出しを乗せる地図（既定＝ホーム地図 homeMap＝唯一の地図）
function openPopup(lat, lng, html, wire, targetMap){
  if(openInfoWindow){ openInfoWindow.close(); openInfoWindow=null; }
  var iw = new google.maps.InfoWindow({ content:html, maxWidth:240 });
  google.maps.event.addListener(iw, "domready", function(){
    // InfoWindowの中身は .markform をユニークに含む＝そこを起点に結線
    var forms = document.querySelectorAll(".gm-style .markform");
    var el = forms[forms.length-1];
    if(el) wire(el, iw);
  });
  google.maps.event.addListener(iw, "closeclick", function(){ openInfoWindow=null; });
  iw.setPosition({lat:lat, lng:lng});
  iw.open(targetMap || homeMap);
  openInfoWindow = iw;
}

// ── ① 新規ピン：現在地 or タップ地点に仮置き → マークを選ぶ → 確定 ──
// targetMap＝吹き出しを乗せる地図（既定＝ホーム地図 homeMap＝唯一の地図）。
// 確定後の再描画は renderPins() がホーム地図を更新＝保存形式・フローは従来と同一。
function openNewPin(lat, lng, acc, sample, targetMap){
  var now = new Date();
  var timeLabel = ("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2);
  var state = { status:"", maker:"", eco:"" };
  var html = markFormHtml({isNew:true, lat:lat, lng:lng, acc:acc, time:timeLabel, sample:sample});
  openPopup(lat, lng, html, function(el, iw){
    wireChips(el, state);
    el.querySelector('[data-act="save"]').addEventListener("click", function(){
      if(!state.status){ alert("状態を1つ選んでください（色のチップ）。"); return; }
      var comment = el.querySelector("textarea").value.trim();
      var iso = now.toISOString();
      pins.push({ lat:lat, lng:lng, acc:acc, status:state.status, maker:state.maker, eco:state.eco,
                  comment:comment, created:iso, updated:iso });
      savePins(); renderPins(); iw.close(); openInfoWindow=null;
    });
    el.querySelector('[data-act="cancel"]').addEventListener("click", function(){ iw.close(); openInfoWindow=null; });
  }, targetMap);
}

// ── ② 既存ピンの更新：マーク変更／コメント／📍位置取り直し／削除 ──
function openEditPin(p){
  var state = { status:p.status||"", maker:p.maker||"", eco:p.eco||"" };
  var t = new Date(p.updated||p.created||Date.now());
  var timeLabel = ("0"+t.getHours()).slice(-2)+":"+("0"+t.getMinutes()).slice(-2);
  var html = markFormHtml({isNew:false, status:p.status, maker:p.maker, eco:p.eco, comment:p.comment,
    lat:p.lat, lng:p.lng, acc:p.acc, time:timeLabel, sample:false});
  openPopup(p.lat, p.lng, html, function(el, iw){
    wireChips(el, state);
    el.querySelector('[data-act="save"]').addEventListener("click", function(){
      p.status = state.status; p.maker = state.maker; p.eco = state.eco;
      p.comment = el.querySelector("textarea").value.trim();
      p.updated = new Date().toISOString();
      savePins(); renderPins(); iw.close(); openInfoWindow=null;
    });
    // 🧍 ストリートビュー＝アプリ内のパノラマで開く（外部Googleマップに飛ばさない）
    var panoBtn = el.querySelector('[data-act="pano"]');
    if(panoBtn) panoBtn.addEventListener("click", function(){ openStreetView(p.lat, p.lng); });
    // 📍 位置を取り直す（更新時もGPSを取る＝家を正確に）
    el.querySelector('[data-act="retake"]').addEventListener("click", function(){
      // 編集中の状態/メーカー/エコ/コメントは先に控える
      var keepS = state.status, keepM = state.maker, keepE = state.eco;
      var keepComment = el.querySelector("textarea").value.trim();
      getHere(function(h){
        p.lat=h.lat; p.lng=h.lng; p.acc=h.acc; p.status=keepS; p.maker=keepM; p.eco=keepE; p.comment=keepComment;
        p.updated=new Date().toISOString();
        hereLatLng=[h.lat,h.lng]; hereAcc=h.acc; drawHere();
        savePins(); renderPins(); iw.close(); openInfoWindow=null;
        if(homeMap){
          homeMap.setCenter({lat:h.lat, lng:h.lng});
          homeMap.setZoom(Math.max(homeMap.getZoom()||18, 18));
        }
      });
    });
    el.querySelector('[data-act="del"]').addEventListener("click", function(){
      pins = pins.filter(function(x){ return x!==p; });
      savePins(); renderPins(); iw.close(); openInfoWindow=null;
    });
  });
}

// ── 凡例（状態の色見本）をホームに描く ──
function renderHomeLegend(){
  var box = document.getElementById("homeLegend");
  if(!box) return;
  // 小さく＝状態の先頭4つの色（状態リストに追従）
  box.innerHTML = STATUSES.slice(0,4).map(function(s){
    return '<span><i class="dot" style="background:'+esc(s.color)+'"></i>'+esc(s.name)+'</span>';

}

/* ── ③ メーカー（MAKERS）の 一覧/追加/編集/削除 ──────────────────────
   ・MAKERS（apo.makers.v1）を編集。メーカーの key は保持＝既存ピン互換。
   ・状態(STATUSES)は今回固定。letter＝ピンに出す文字、name＝表示名。
   ・変わったら：ピンの再描画・凡例・開いているチップ系（homePick）に即反映。 */
function refreshMarkConsumers(){
  saveMakers();
  renderHomeLegend();
  if(typeof renderPins === "function") renderPins();   // 地図ピン＆リストの文字（letter）更新
  // ホームの選びシートが開いていればチップを貼り直す
  var hpChips = document.getElementById("homePickChips");
  if(hpChips && document.getElementById("homePick").classList.contains("show")){
    hpChips.innerHTML = pickerGroupsHtml(homePickState);
    wireHomePickChips();
  }
}

function openKinds(){
  document.getElementById("kindsVeil").classList.add("show");
  document.getElementById("kindsSheet").classList.add("show");
  renderKindsList();

function closeKinds(){
  document.getElementById("kindsVeil").classList.remove("show");

// メーカーの一覧を描く（letterバッジ＋名前）
function renderKindsList(){
  var box = document.getElementById("kindsList");
  if(!box) return;
  box.innerHTML = MAKERS.map(function(m,i){
    return '<div class="kindrow" data-i="'+i+'">'
      +   '<span class="ic"><span class="cbadge">'+esc(m.letter)+'</span></span>'
      +   '<span class="nm">'+esc(m.name)+'</span>'
      +   '<span class="acts">'
      +     '<button class="edit" type="button" data-edit="'+i+'">✏️</button>'
      +     '<button class="del" type="button" data-del="'+i+'">🗑️</button>'
      +   '</span>'
      + '</div>';
  }).join("");
  box.querySelectorAll("button[data-edit]").forEach(function(b){
    b.addEventListener("click", function(){ openKindEdit(parseInt(b.getAttribute("data-edit"),10)); });
  });
  box.querySelectorAll("button[data-del]").forEach(function(b){
    b.addEventListener("click", function(){
      var i = parseInt(b.getAttribute("data-del"),10);
      var m = MAKERS[i]; if(!m) return;
      if(MAKERS.length<=1){ alert("最後の1社は消せません（1つは残してください）。"); return; }
      if(!confirm("メーカー「"+m.name+"」を消しますか？\n（このメーカーで記録済みのピンは文字なしで表示されます）")) return;
      MAKERS.splice(i,1);
      refreshMarkConsumers();
      renderKindsList();
    });
  });
}
// 追加/編集フォームを行として開く（index<0=新規）。letter（ピンの文字）＋name（表示名）。
function openKindEdit(index){
  var isNew = (index<0);
  var m = isNew ? {key:"", letter:"", name:""} : MAKERS[index];
  var box = document.getElementById("kindsList");
  // 既存の編集フォームを閉じてから開く（1つだけ）
  var prev = box.querySelector(".kindedit"); if(prev) renderKindsList();
  var form = document.createElement("div");
  form.className = "kindedit";
  form.innerHTML = ''
    + '<div class="frow">'
    +   '<input class="icon" type="text" maxlength="4" value="'+esc(m.letter||"")+'" placeholder="文字" aria-label="ピンに出す文字（例：P・三・カナ）">'
    +   '<input class="name" type="text" value="'+esc(m.name||"")+'" placeholder="メーカー名（例：ニチコン）" aria-label="メーカー名">'
    + '</div>'
    + '<div class="frow btns">'
    +   '<button class="cancel" type="button">やめる</button>'
    +   '<button class="save" type="button">'+(isNew?"追加":"保存")+'</button>'
    + '</div>';
  if(isNew) box.appendChild(form);
  else { var row = box.querySelector('.kindrow[data-i="'+index+'"]'); if(row) box.replaceChild(form, row); else box.appendChild(form); }
  form.scrollIntoView({block:"nearest"});
  form.querySelector(".name").focus();
  form.querySelector(".cancel").addEventListener("click", renderKindsList);
  form.querySelector(".save").addEventListener("click", function(){
    var letter = form.querySelector(".icon").value.trim();
    var nm     = form.querySelector(".name").value.trim();
    if(!nm){ alert("メーカー名を入れてください。"); return; }
    if(!letter){ letter = nm.slice(0,2); }   // 文字が空なら名前の頭2文字を仮に使う
    if(isNew){
      MAKERS.push({ key:newMakerKey(), letter:letter, name:nm });
    } else {
      m.letter=letter; m.name=nm;            // keyは保持＝既存ピン互換
    }
    refreshMarkConsumers();
    renderKindsList();
  });
}

/* ── 🧍 ストリートビュー＝アプリ内 全画面オーバーレイで開く（外部Googleマップに飛ばさない） ──
   ・#svPanel を表示し、#svPano に StreetViewPanorama を描く。2回目以降は setPosition で再利用。
   ・「◀ 戻る」で #svPanel を隠す＝下のアポインター画面に戻る（画面遷移しない＝アプリ内に留まる）。 */
var svPano = null;
function openStreetView(lat, lng){
  whenGmaps(function(){
    var panel = document.getElementById("svPanel");
    panel.classList.add("show");
    if(!svPano){
      svPano = new google.maps.StreetViewPanorama(document.getElementById("svPano"), {
        position:{lat:lat, lng:lng},
        pov:{heading:0, pitch:0}, zoom:0,
        addressControl:false, fullscreenControl:false, motionTracking:false
      });
    } else {
      svPano.setPosition({lat:lat, lng:lng});
      svPano.setPov({heading:0, pitch:0});
    }
    // 表示直後はサイズ0で描けないため、レイアウト確定後にリサイズを促す
    setTimeout(function(){ if(svPano) google.maps.event.trigger(svPano, "resize"); }, 60);
  });
}
function closeStreetView(){
  document.getElementById("svPanel").classList.remove("show");
}

// ── ホームの“触れる地図”（指でパン・拡大OK／家タップでその地点にピン・自分のピン＋現在地が乗る） ──
function initHomeMap(){
  if(homeMap || !gmapsReady) return;
  if(!HtmlOverlay) HtmlOverlay = makeHtmlOverlay();
  homeMap = new google.maps.Map(document.getElementById("homeMap"), {
    center:{lat:SAMPLE_CENTER[0], lng:SAMPLE_CENTER[1]},
    zoom:17,
    mapTypeId:"hybrid",
    tilt:0,
    disableDefaultUI:true,       // コントロールは出さない（型を保つ）が地図自体は触れる
    gestureHandling:"greedy",    // 指でパン・ピンチ拡大OK＝“触れる地図”
    keyboardShortcuts:false, clickableIcons:false
  });
  renderPins();
  // ホームのまま地図の家をタップ＝その地点にピン（openNewPin。吹き出しは homeMap に乗せる＝唯一の地図）
  homeMap.addListener("click", function(e){
    openNewPin(e.latLng.lat(), e.latLng.lng(), null, false, homeMap);
  });
  // 現在地が分かればそこを中心に、ピンが有れば全体が入るように
  getHere(function(h){
    hereLatLng=[h.lat,h.lng]; hereAcc=h.acc; drawHere();
    fitHomeView();
  });
}
function fitHomeView(){
  if(!homeMap) return;
  var pts = pins.map(function(p){ return {lat:p.lat, lng:p.lng}; });
  if(hereLatLng) pts.push({lat:hereLatLng[0], lng:hereLatLng[1]});
  if(pts.length>=2){
    var b = new google.maps.LatLngBounds();
    pts.forEach(function(pt){ b.extend(pt); });
    homeMap.fitBounds(b, 24);
    // 寄りすぎ防止（航空写真は深いので上限を抑える）
    google.maps.event.addListenerOnce(homeMap, "idle", function(){
      if(homeMap.getZoom() > 18) homeMap.setZoom(18);
    });
  } else if(pts.length===1){ homeMap.setCenter(pts[0]); homeMap.setZoom(17); }
}

/* ── 新しいピンを“確実に映す”：地図とprojectionの準備を待ってから描く＋寄せる ──
   実機ではGoogle地図が loading=async で遅れて来る／homeMapが作られた直後は
   projection が未準備で drawOnePin が静かに失敗し得る。ここで取りこぼさない。 */
function drawNewHomePin(){
  whenGmaps(function(){
    // ホーム地図がまだ無ければ起こす（API到着後なら作れる）
    if(!homeMap) initHomeMap();
    renderPins();
    fitHomeView();
    // projection未準備で1回目が空振りしても、idleで必ずもう一度描いて寄せる
    if(homeMap){
      google.maps.event.addListenerOnce(homeMap, "idle", function(){
        renderPins(); fitHomeView();
      });
    }
  });
}

// 画面が表示された瞬間に大きさを取り直す（隠れている間は描けない）。API未到着なら待つ。
function onHomeShown(){
  whenGmaps(function(){
    initHomeMap();
    startWatch();   // ホームのプレビューでも自分の点が動く（表示のみ）
    setTimeout(function(){ if(homeMap){
      var c = homeMap.getCenter();
      google.maps.event.trigger(homeMap, "resize");
      if(c) homeMap.setCenter(c);
      renderPins(); drawHere(); fitHomeView();
    } }, 60);
  });
}
