<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1a1815" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="LOG POSE" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<title>LOG POSE</title>
<!-- ★地図を最速：外枠の読込時点で(1)地図ドメインへ接続を温める＋(2)地図の本体JSを先回りダウンロード（中身apo.htmlが取りに行く前に並行で取得＝直列の待ちを短縮） -->
<link rel="preconnect" href="https://maps.googleapis.com" crossorigin>
<link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
<link rel="preconnect" href="https://khms0.googleapis.com" crossorigin>
<link rel="preconnect" href="https://khms1.googleapis.com" crossorigin>
<link rel="dns-prefetch" href="https://maps.googleapis.com">
<link rel="preload" as="script" href="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKNs7uzY9RsM2qZXdBlL6cekzQauM3PL4&v=weekly&loading=async&callback=__initGmaps">

<style>
  /* ============================================================
     入口（ランチャー）は1つ。開いたら前回の画面に直行。
     切り替えは左上の ☰ だけ。タップ数を増やさないための器。
     色は本人画面の「墨＋朱＋金」を踏襲（温かいダーク）。
     ============================================================ */
  :root{
    --paper:#1a1815;        /* 背景：夜に向かう墨 */
    --paper2:#211e1a;
    --card:#252119;         /* 和紙カード */
    --card-edge:#3a342a;    /* 縁・仕切り線 */
    --ink:#f0e9da;          /* 主役の文字 */
    --ink-soft:#b8ad97;     /* 副文字 */
    --ink-faint:#857a64;    /* 注記 */
    --vermilion:#d98a5b;    /* 朱・夕陽（行動の差し色） */
    --vermilion-soft:#e3a378;
    --gold:#cbb27a;         /* ほのかな金（見出し） */
    --leaf:#8fae7d;         /* 達成・控えめ */
    --r-lg:18px; --r-md:13px; --r-sm:9px;
    --gap:10px; --pad:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-text-size-adjust:100%;}
  html,body{height:100%; overflow:hidden;}
  /* 土台(html)を墨色で塗る＝外枠の最下部・safe-areaに白いすき間を出さない（白消し） */
  html{ background:var(--paper); }
  body::before{
    content:""; position:fixed; top:0; left:0; right:0;
    height:100dvh; min-height:100vh;
    background:var(--paper); z-index:-1; pointer-events:none;
  }
  body{
    background:radial-gradient(120% 70% at 50% -10%, #2a241c 0%, var(--paper) 55%, var(--paper2) 100%);
    color:var(--ink);
    font-family:"Zen Kurenaido","Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.55;
  }

  /* ── 役職画面を1枚で映す窓 ── */
  #stage{position:fixed; top:0; left:0; width:100%; height:calc(100dvh - var(--tabbar-h) - env(safe-area-inset-bottom)); border:0; background:var(--paper); display:none;}
  #stage.show{display:block;}

  /* ── 左上の ☰（切替時だけ押す）── */
  #hamb{
    position:fixed; z-index:30;
    top:calc(env(safe-area-inset-top) + 8px);
    left:calc(env(safe-area-inset-left) + 8px);
    width:42px; height:42px; border-radius:var(--r-md);
    border:1px solid var(--card-edge);
    background:rgba(37,33,25,.82); color:var(--ink);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    font-size:20px; line-height:1; cursor:pointer; display:none;
    box-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  #hamb.show{display:block;}
  #hamb:active{background:rgba(217,138,91,.25); border-color:var(--vermilion);}

  /* ── メニュー（オーバーレイ）── */
  #overlay{
    position:fixed; inset:0; z-index:40; display:none;
    background:rgba(14,12,10,.78); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
    padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
  }
  #overlay.show{display:block;}
  .sheet{
    max-width:480px; margin:0 auto; padding-top:18px;
    display:flex; flex-direction:column; height:100%;
  }
  .sheet h1{font-family:"Yuji Syuku","Hiragino Mincho ProN",serif;
    font-size:19px; color:var(--gold); letter-spacing:.04em; margin:6px 4px 2px;}
  .sheet .lead{color:var(--ink-faint); font-size:12px; margin:0 4px 14px;}
  .menu{display:flex; flex-direction:column; gap:var(--gap); overflow-y:auto;}

  .item{
    display:flex; align-items:center; gap:13px;
    background:var(--card); border:1px solid var(--card-edge);
    border-radius:var(--r-lg); padding:15px var(--pad); cursor:pointer;
    text-align:left; color:var(--ink); width:100%;
    transition:border-color .15s, transform .05s;
  }
  .item:active{transform:scale(.99); border-color:var(--vermilion);}
  .item .ico{font-size:26px; width:36px; text-align:center; flex:0 0 auto;}
  .item .body{flex:1 1 auto; min-width:0;}
  .item .name{font-size:16px; color:var(--ink); line-height:1.3;}
  .item .hint{font-size:12px; color:var(--ink-faint); margin-top:2px;}
  .item .last{font-size:11px; color:var(--vermilion-soft); margin-top:3px;}
  .item.recent{border-color:rgba(217,138,91,.5);}
  .item.soon{opacity:.62;}
  .item.soon .ico{filter:grayscale(.4);}

  .closebar{margin:14px 4px 6px; text-align:center;}
  .closebar button{
    background:transparent; border:1px solid var(--card-edge); color:var(--ink-soft);
    border-radius:99px; padding:9px 22px; font-size:13px; cursor:pointer;
    font-family:inherit;
  }
  .closebar button:active{border-color:var(--vermilion); color:var(--ink);}

  /* ── 「準備中」の小さな知らせ ── */
  #toast{
    position:fixed; z-index:60; left:50%; bottom:calc(env(safe-area-inset-bottom) + 28px);
    transform:translateX(-50%) translateY(12px);
    background:var(--card); border:1px solid var(--vermilion);
    color:var(--ink); font-size:14px; padding:11px 20px; border-radius:99px;
    box-shadow:0 4px 16px rgba(0,0,0,.45);
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  /* 下メニューバー（6アイコン）＝将来の画面切替の土台。今は🏠🗺️が連動・他は「準備中」。 */
  :root{ --tabbar-h:54px; }
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:25;
    height:calc(var(--tabbar-h) + env(safe-area-inset-bottom));
    padding:0 4px env(safe-area-inset-bottom);
    display:flex; align-items:stretch;
    background:linear-gradient(180deg, var(--card), var(--paper2));
    border-top:1px solid var(--card-edge);
    box-shadow:0 -8px 22px -16px rgba(0,0,0,.8);
  }
  .tabbar button{
    flex:1 1 0; min-width:0; background:transparent; border:0; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    color:var(--ink-faint); font-family:inherit; padding:6px 0 4px;
    transition:color .12s ease, transform .12s ease;
  }
  .tabbar button .ic{ font-size:20px; line-height:1; }
  .tabbar button .lb{ font-size:10px; letter-spacing:.02em; white-space:nowrap; }
  .tabbar button:active{ transform:scale(.9); }
  .tabbar button.on{ color:var(--vermilion-soft); }
  .tabbar button.soon{ opacity:.5; }
</style>
</head>
<body>

  <!-- 役職画面はこの1枚の窓に映す（中身は同じフォルダの既存ファイル） -->
  <iframe id="stage" title="役職画面"></iframe>

  <!-- 左上の切替ボタン（画面を見ている間だけ出る） -->
  <button id="hamb" aria-label="画面を切り替える">☰</button>

  <!-- メニュー（切替の時だけ開く） -->
  <div id="overlay">
    <div class="sheet">
      <h1>どの画面を開く？</h1>
      <div class="lead">いつもの画面はそのまま開きます。切り替えたい時だけここから。</div>
      <div class="menu" id="menu"><!-- JSで描く --></div>
      <div class="closebar"><button id="closeBtn">閉じる</button></div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- 下メニューバー（6アイコン）：🏠ホーム/🗺️マップは既存画面へ連動、他は準備中。後で画面を作ったら data-key を足すだけ。 -->
  <nav class="tabbar" id="tabbar" aria-label="メニュー">
    <button type="button" data-key="apo"><span class="ic">🏠</span><span class="lb">ホーム</span></button>
    <button type="button" data-key="map"><span class="ic">🗺️</span><span class="lb">マップ</span></button>
    <button type="button" data-soon="1"><span class="ic">📍</span><span class="lb">記録</span></button>
    <button type="button" data-soon="1"><span class="ic">📊</span><span class="lb">成績</span></button>
    <button type="button" data-soon="1"><span class="ic">📤</span><span class="lb">送る</span></button>
    <button type="button" data-soon="1"><span class="ic">⚙️</span><span class="lb">設定</span></button>
  </nav>

<script>
/* ============================================================
   束ねる画面の定義（同じフォルダの相対パス＝file:// でも Pages でも動く）
   ============================================================ */
var SCREENS = {
  apo: {
    icon:"📱", name:"アポインター（自分の画面）",
    hint:"きょうの自分・記録",
    src:"apo.html"
  },
  map: {
    icon:"🗺️", name:"管理マップ",
    hint:"みんなの足あと（管理者）",
    src:"admin.html"
  },
  closer: {
    icon:"💤", name:"クローザー画面",
    hint:"準備中",
    soon:true
  }
};

var BUILD = "20260620-170229";  // 更新のたび変える＝古いキャッシュを避ける合言葉
/* 常に最新を取りに行く（サービスワーカー＝network-first）。挙動は変えない・裏方だけ */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }

var LS_LAST = "launcher.last";       // 最後に開いた画面のキー
var LS_HIST = "launcher.history";    // 最近使った順（配列）

var stage   = document.getElementById("stage");
var hamb    = document.getElementById("hamb");
var overlay = document.getElementById("overlay");
var menuEl  = document.getElementById("menu");
var toastEl = document.getElementById("toast");
var toastTimer = null;

/* ── 履歴の読み書き ── */
function getHistory(){
  try{ var a = JSON.parse(localStorage.getItem(LS_HIST) || "[]");
       return Array.isArray(a) ? a : []; }
  catch(e){ return []; }
}
function pushHistory(key){
  var a = getHistory().filter(function(k){ return k !== key; });
  a.unshift(key);                       // 最近を先頭に
  a = a.slice(0, 8);
  try{ localStorage.setItem(LS_HIST, JSON.stringify(a)); }catch(e){}
}

/* ── 画面を窓に映す（＝iframe差し替え＋記録）── */
function openScreen(key){
  var s = SCREENS[key];
  if(!s) return;
  if(s.soon){ showToast("準備中です"); return; }   // クローザーはまだ
  if(stage.getAttribute("data-key") !== key){
    stage.src = s.src + (s.src.indexOf('?')<0?'?':'&') + 'v=' + BUILD;
    stage.setAttribute("data-key", key);
  }
  stage.classList.add("show");
  hamb.classList.add("show");
  closeMenu();
  try{ localStorage.setItem(LS_LAST, key); }catch(e){}
  pushHistory(key);
}

/* ── メニュー（最近使った順に並べる）── */
function buildMenu(){
  menuEl.innerHTML = "";
  var hist = getHistory();
  var keys = Object.keys(SCREENS);
  // 最近使った順 → 未使用は元の順で後ろに
  keys.sort(function(a,b){
    var ia = hist.indexOf(a), ib = hist.indexOf(b);
    if(ia === -1 && ib === -1) return 0;
    if(ia === -1) return 1;
    if(ib === -1) return -1;
    return ia - ib;
  });
  keys.forEach(function(key){
    var s = SCREENS[key];
    var btn = document.createElement("button");
    btn.className = "item" + (s.soon ? " soon" : "") +
                    (hist.indexOf(key) === 0 && !s.soon ? " recent" : "");
    var last = (hist.indexOf(key) === 0 && !s.soon) ? '<div class="last">前回ひらいた画面</div>' : "";
    btn.innerHTML =
      '<div class="ico">'+s.icon+'</div>'+
      '<div class="body"><div class="name">'+s.name+'</div>'+
      '<div class="hint">'+s.hint+'</div>'+last+'</div>';
    btn.addEventListener("click", function(){ openScreen(key); });
    menuEl.appendChild(btn);
  });
}
function openMenu(){ buildMenu(); overlay.classList.add("show"); }
function closeMenu(){ overlay.classList.remove("show"); }

/* ── 準備中などの小さな知らせ ── */
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 1800);
}

/* ── ボタンの配線 ── */
hamb.addEventListener("click", openMenu);
document.getElementById("closeBtn").addEventListener("click", function(){
  // どの画面も開いていない初回はメニューを残す（行き先が無いので）
  if(stage.classList.contains("show")) closeMenu();
});

/* ============================================================
   起動：①テスト用ディープリンク（#apo/#map/#menu）を最優先
         ②なければ前回の画面に直行（localStorage）
         ③それも無ければ（初回）メニューを表示
   ============================================================ */
function boot(){
  var h = (location.hash || "").replace("#","");
  if(h === "menu"){ openMenu(); return; }
  if(SCREENS[h]){ openScreen(h); return; }

  var last = null;
  try{ last = localStorage.getItem(LS_LAST); }catch(e){}
  if(last && SCREENS[last] && !SCREENS[last].soon){
    openScreen(last);            // 前回の画面へ直行（メニューを通らない）
  }else{
    openMenu();                  // 初回はメニュー
  }
}

// ハッシュだけ後から変えた検証にも追従
window.addEventListener("hashchange", function(){
  var h = (location.hash || "").replace("#","");
  if(h === "menu"){ openMenu(); }
  else if(SCREENS[h]){ openScreen(h); }
});

boot();

/* 下メニューバー（6アイコン）の配線＝既存画面は切替／未実装は「準備中」。 */
(function(){
  var bar = document.getElementById("tabbar");
  if(!bar) return;
  var btns = Array.prototype.slice.call(bar.querySelectorAll("button"));
  function syncOn(){
    var cur = stage.getAttribute("data-key");
    btns.forEach(function(b){ b.classList.toggle("on", !!b.dataset.key && b.dataset.key === cur); });
  }
  btns.forEach(function(b){
    b.addEventListener("click", function(){
      if(b.dataset.soon){ showToast("準備中です"); return; }
      if(b.dataset.key){ openScreen(b.dataset.key); }
    });
  });
  var _open = openScreen;
  openScreen = function(k){ _open(k); syncOn(); };
  syncOn();
})();

(function(){var L=null;function p(){fetch("ver.txt?t="+Date.now(),{cache:"no-store"}).then(function(r){return r.text();}).then(function(t){if(L===null){L=t;}else if(t!==L){location.reload(true);}}).catch(function(){});}setInterval(p,5000);})();
</script>
</body>
</html>
